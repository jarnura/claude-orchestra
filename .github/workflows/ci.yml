name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck on bin/
        run: shellcheck bin/*
      - name: Run shellcheck on lib/
        run: |
          if ls lib/*.sh 2>/dev/null | grep -q .; then
            shellcheck lib/*.sh
          fi
      - name: Run shellcheck on adapters/
        run: |
          if ls adapters/**/*.sh 2>/dev/null | grep -q .; then
            shellcheck adapters/**/*.sh
          fi

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff mypy
      - name: ruff check
        run: ruff check bin/orchestra-serve bin/orchestra-dashboard
      - name: mypy
        run: mypy bin/orchestra-serve --ignore-missing-imports

  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up mock ECC_DIR
        run: mkdir -p ~/.claude/agents
      - name: Run shell tests
        run: bash tests/test-*.sh
        continue-on-error: false

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: |
          if [ -f tests/test_serve.py ]; then
            pytest tests/test_serve.py -v
          else
            echo "tests/test_serve.py not found, skipping"
          fi
