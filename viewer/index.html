async function renderTaskTimeline(runId, taskId) {
  const app = $('#app');
  const displayName = taskId.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  setBreadcrumb({ text: 'Runs', href: '#/runs' }, { text: runId, href: `#/run/${runId}` }, { text: displayName + ' Timeline' });
  app.innerHTML = '<div class="loading">Parsing timeline...</div>';

  try {
    const key = `${runId}/${taskId}`;
    if (!cache.streams[key]) cache.streams[key] = await api.getStream(runId, taskId);
    const data = cache.streams[key];

    let html = `<div class="output-toolbar">
      <a class="btn" href="#/run/${runId}/${taskId}/output">View Output</a>
      <a class="btn" href="#/run/${runId}">← Back to Run</a>
    </div>`;

    // Meta bar
    const m = data.meta || {};
    html += `<div class="tl-meta">
      <div class="tl-meta-item"><span class="tl-meta-label">Duration</span><span class="tl-meta-value">${formatDuration(m.duration_ms)}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Cost</span><span class="tl-meta-value">${m.total_cost_usd ? '$' + m.total_cost_usd.toFixed(2) : '—'}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Turns</span><span class="tl-meta-value">${m.num_turns || '—'}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Tokens</span><span class="tl-meta-value">${(m.input_tokens||0) + (m.output_tokens||0) || '—'}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Events</span><span class="tl-meta-value">${data.events.length}</span></div>
    </div>`;

    html += '<div class="timeline" id="timeline"></div>';
    app.innerHTML = html;

    // Incremental rendering
    const container = $('#timeline');
    const events = data.events;
    let i = 0;
    function renderBatch() {
      const end = Math.min(i + 15, events.length);
      for (; i < end; i++) {
        container.appendChild(renderTimelineEvent(events[i]));
      }
      if (i < events.length) requestAnimationFrame(renderBatch);
    }
    requestAnimationFrame(renderBatch);
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

// ── Timeline Event Renderers ──
const TOOL_ICONS = { Read: '📄', Write: '✏️', Edit: '✏️', Glob: '🔍', Grep: '🔍', Bash: '⚡', Agent: '🤖', Task: '🤖', WebFetch: '🌐', TodoWrite: '📋' };

function renderTimelineEvent(ev) {
  const div = document.createElement('div');
  div.className = 'tl-event';

  switch (ev.type) {
    case 'init':
      div.classList.add('tl-init');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header"><span class="tl-tool-icon">🚀</span> <span class="tl-tool-name">Session Init</span>
        <span class="tl-tool-summary">model: ${ev.model || '?'} · tools: ${ev.tool_count || '?'} · cwd: ${(ev.cwd||'').split('/').pop()}</span></div></div>`;
      break;

    case 'thinking':
      div.classList.add('tl-thinking');
      const thinkPreview = (ev.text || '').substring(0, 80) + ((ev.text||'').length > 80 ? '...' : '');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <span class="tl-tool-icon">🧠</span> <span class="tl-tool-name" style="color:var(--yellow)">Thinking</span>
          <span class="tl-tool-summary">${escapeHtml(thinkPreview)}</span>
        </div>
        <div class="tl-card-body" style="display:none">${escapeHtml(ev.text || '')}</div>
      </div>`;
      break;

    case 'tool_use':
      div.classList.add('tl-tool');
      const icon = TOOL_ICONS[ev.name] || '🔧';
      const inputStr = ev.input ? JSON.stringify(ev.input, null, 2) : '';
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header" onclick="this.parentElement.querySelector('.tl-card-body').style.display = this.parentElement.querySelector('.tl-card-body').style.display === 'none' ? 'block' : 'none'">
          <span class="tl-tool-icon">${icon}</span>
          <span class="tl-tool-name">${ev.name}</span>
          <span class="tl-tool-summary">${escapeHtml(ev.summary || '')}</span>
        </div>
        <div class="tl-card-body" style="display:none"><strong style="color:var(--text)">Input:</strong>\n${escapeHtml(inputStr)}\n\n<strong style="color:var(--text)">Result:</strong>\n${escapeHtml(ev.result || '(empty)')}${ev.result_truncated ? '\n... (truncated)' : ''}</div>
      </div>`;
      break;

    case 'text':
      div.classList.add('tl-text');
      const textPreview = (ev.text || '').substring(0, 100) + ((ev.text||'').length > 100 ? '...' : '');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <span class="tl-tool-icon">💬</span> <span class="tl-tool-name" style="color:var(--green)">Response</span>
          <span class="tl-tool-summary">${escapeHtml(textPreview)}</span>
        </div>
        <div class="tl-card-body" style="display:none">${escapeHtml(ev.text || '')}</div>
      </div>`;
      break;

    case 'progress':
      div.classList.add('tl-progress');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-compact">${ev.tool_name ? `<span class="tag">${ev.tool_name}</span> ` : ''}${escapeHtml(ev.description || '')}</div>`;
      break;

    case 'task_started':
      div.classList.add('tl-notification');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card"><div class="tl-card-header">
        <span class="tl-tool-icon">📌</span> <span class="tl-tool-name" style="color:var(--orange)">Task Started</span>
        <span class="tl-tool-summary">${escapeHtml(ev.description || '')}</span>
      </div></div>`;
      break;

    case 'task_notification':
      div.classList.add('tl-notification');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card"><div class="tl-card-header">
        <span class="tl-tool-icon">✅</span> <span class="tl-tool-name" style="color:var(--orange)">Task Complete</span>
        <span class="tl-tool-summary">${escapeHtml(ev.summary || ev.status || '')}</span>
      </div></div>`;
      break;

    case 'rate_limit':
      div.classList.add('tl-notification');
      div.innerHTML = `<div class="tl-dot" style="background:var(--red);border-color:var(--red)"></div><div class="tl-card" style="border-color:#ef444440"><div class="tl-card-header">
        <span class="tl-tool-icon">⚠️</span> <span class="tl-tool-name" style="color:var(--red)">Rate Limited</span>
      </div></div>`;
      break;

    default:
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-compact" style="color:var(--text-dim)">${ev.type}: ${JSON.stringify(ev).substring(0, 80)}</div>`;
  }
  return div;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function configRenderTab() {
  const content = $('#config-content');
  if (!content) return;
  content.innerHTML = '<div class="loading">Loading...</div>';
  try {
    if (configState.tab === 'agents') await configRenderAgents(content);
    else if (configState.tab === 'skills') await configRenderSkills(content);
    else if (configState.tab === 'hooks') await configRenderHooks(content);
    applyStaggerAnimation(content, '.config-card');
  } catch (e) {
    content.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

function configFilterByScope(items) {
  if (configState.scope === 'all') return items;
  return items.filter(i => i.scope === configState.scope);
}

function configExtractMeta(content) {
  const lines = (content || '').split('\n');
  let desc = '', model = '';
  for (const line of lines.slice(0, 30)) {
    const dl = line.toLowerCase();
    if (dl.startsWith('description:')) desc = line.slice(12).trim();
    if (dl.match(/^model\s*:/)) model = line.split(':').slice(1).join(':').trim();
    if (dl.match(/^#+\s/) && !desc) desc = line.replace(/^#+\s*/, '');
  }
  return { desc: desc || 'No description', model };
}

// ── Editor Modal ──
function configShowEditorModal(title, name, body, scope, onSave, isNew) {
  // Remove existing modal if any
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `<div class="modal">
    <div class="modal-header">
      <h3>${escapeHtml(title)}</h3>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <div class="modal-body">
      ${isNew ? `<div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" id="modal-name" value="${escapeHtml(name)}" placeholder="my-agent-name" pattern="[a-zA-Z0-9_-]+">
      </div>` : ''}
      <div class="form-group">
        <label class="form-label">Scope</label>
        <select class="form-input" id="modal-scope">
          <option value="global" ${scope === 'global' ? 'selected' : ''}>Global (~/.claude)</option>
          <option value="project" ${scope === 'project' ? 'selected' : ''}>Project (.claude)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Content (Markdown)</label>
        <textarea class="form-textarea" id="modal-content">${escapeHtml(body)}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="modal-save">Save</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);

  // Focus on name input if new, otherwise content
  const focusEl = isNew ? overlay.querySelector('#modal-name') : overlay.querySelector('#modal-content');
  if (focusEl) setTimeout(() => focusEl.focus(), 50);

  overlay.querySelector('#modal-save').onclick = async () => {
    const finalName = isNew ? overlay.querySelector('#modal-name').value.trim() : name;
    const finalScope = overlay.querySelector('#modal-scope').value;
    const finalContent = overlay.querySelector('#modal-content').value;

    if (!finalName) { alert('Name is required'); return; }
    if (!/^[a-zA-Z0-9_-]+$/.test(finalName)) { alert('Name must contain only letters, numbers, hyphens, and underscores'); return; }
    if (!finalContent.trim()) { alert('Content is required'); return; }

    const saveBtn = overlay.querySelector('#modal-save');
    saveBtn.textContent = 'Saving...';
    saveBtn.disabled = true;

    try {
      await onSave(finalName, finalScope, finalContent);
      overlay.remove();
    } catch (e) {
      alert('Save failed: ' + e.message);
      saveBtn.textContent = 'Save';
      saveBtn.disabled = false;
    }
  };

  // Esc to close
  const escHandler = (e) => {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); }
  };
  document.addEventListener('keydown', escHandler);
}

// ── Workspace Screen ──
const wsState = { repos: null, selectedRepo: null, taskFiles: null, selectedFile: null, tasks: [], agents: null, skills: null, pipelineTemplates: null, pipelineDocs: null, pipelines: [], activeRuns: [], activeRunsInterval: null, wsBrainstormMode: 'orchestra', wsProgressMessage: '', generatedTasksFile: null };

async function renderWorkspaceScreen() {

  app.innerHTML = '<div class="loading">Loading workspace...</div>';

        <span style="color:var(--cyan)">WORK</span><span style="color:var(--text-dim)">//</span>SPACE

    mainHtml += `<div class="ws-top">
      <div class="ws-select" style="flex:1">
        <label>Repository</label>
        <select id="ws-repo-select" onchange="wsSelectRepo(this.value)">
          <option value="">— select repo —</option>
          ${wsState.repos.map(r =>
            `<option value="${escapeHtml(r.path)}" ${wsState.selectedRepo === r.path ? 'selected' : ''}>${escapeHtml(r.name)} (${escapeHtml(r.path)})</option>`
          ).join('')}
        </select>
      </div>
      <button class="btn btn-primary" onclick="wsNewTask()" ${!wsState.selectedRepo ? 'disabled style="opacity:0.4"' : ''}>+ New Task</button>
    </div>`;

    // Task file tabs + task list
    mainHtml += '<div id="ws-content">';
    if (wsState.selectedRepo && wsState.taskFiles) {
      mainHtml += wsRenderTaskArea();
    } else if (wsState.selectedRepo) {
      mainHtml += '<div class="loading">Loading tasks...</div>';
    } else {
      mainHtml += '<div class="ws-empty">Select a repository to view tasks</div>';
    }
    mainHtml += '</div>';

    // ── Sidebar Column: Active Runs + Brainstorm ──
    // Active Runs
    sidebarHtml += `<div class="ws-active-runs">
      <h3>Active Runs</h3>
      <div id="ws-active-runs">${wsRenderActiveRuns(wsState.activeRuns)}</div>
    </div>`;

    // Brainstorm Panel
    const bsMode = wsState.wsBrainstormMode || 'orchestra';
    sidebarHtml += `<div class="ws-brainstorm">
      <h3>Brainstorm</h3>
      <div class="ws-brainstorm-row" style="margin-bottom:10px">
        <label style="font-size:0.8rem;color:var(--text-muted);white-space:nowrap">Mode</label>
        <select id="ws-brainstorm-mode" onchange="wsRenderBrainstormModeFields()" style="flex:1">
          <option value="orchestra" ${bsMode === 'orchestra' ? 'selected' : ''}>Orchestra</option>
          <option value="pipeline-template" ${bsMode === 'pipeline-template' ? 'selected' : ''}>Pipeline: Template</option>
          <option value="pipeline-custom" ${bsMode === 'pipeline-custom' ? 'selected' : ''}>Pipeline: Custom</option>
          <option value="stage-tasks" ${bsMode === 'stage-tasks' ? 'selected' : ''}>Stage Tasks</option>
        </select>
      </div>
      <div id="ws-brainstorm-mode-fields">
        ${wsBrainstormModeFieldsHtml(bsMode)}
      </div>
      <div class="form-group">
        <textarea id="ws-brainstorm-prompt" class="form-textarea" style="min-height:60px;max-height:120px" placeholder="Describe what you want to build..."></textarea>
      </div>
      <div class="ws-brainstorm-row">
        <select id="ws-brainstorm-model">
          <option value="sonnet" selected>sonnet</option>
          <option value="opus">opus</option>
          <option value="haiku">haiku</option>
        </select>
        <button id="ws-brainstorm-btn" class="btn btn-primary" onclick="wsBrainstorm()">${wsBrainstormBtnLabel(bsMode)}</button>
      </div>
      <div class="ws-brainstorm-row" style="margin-top:8px">
        <select id="ws-bs-map-template" title="Pipeline template for Generate & Map" style="min-width:100px;flex:1">
          <option value="feature">feature</option>
          <option value="bugfix">bugfix</option>
          <option value="audit">audit</option>
          <option value="refactor">refactor</option>
          <option value="release">release</option>
          <option value="custom">custom</option>
        </select>
        <button class="btn" style="white-space:nowrap;border-color:var(--accent);color:var(--accent)" onclick="wsGenerateAndMap()" title="Generate tasks and open in Pipeline Mapper">Generate &amp; Map</button>
      </div>

      <div class="ws-progress" id="wsBrainstormProgress">${escapeHtml(wsState.wsProgressMessage || '')}</div>

      <div id="ws-tasks-md-container" style="display:none">
        <div class="ws-tasks-md-header">
          <h4 id="ws-tasks-md-filename" style="font-family:var(--mono);font-size:0.85rem;color:var(--accent)">tasks.md</h4>
          <span id="ws-task-count"></span>
        </div>
        <textarea id="ws-tasks-md" class="code-editor"></textarea>
        <div class="ws-tasks-md-actions">
          <button class="btn" onclick="wsSaveTasksMd()">Save</button>

        </div>
      </div>
    </div>`;

    // Combine into layout
    const html = `<div class="ws-layout">

      <div class="ws-sidebar">${sidebarHtml}</div>

    app.innerHTML = html;

    // If repo is selected but tasks not loaded yet, load them
    if (wsState.selectedRepo && !wsState.taskFiles) {
      await wsLoadRepoTasks(wsState.selectedRepo);
    }

    // Apply stagger animation to task cards
    applyStaggerAnimation(app, '.ws-task-card');

    // Start polling active runs
    wsStartActiveRunsPolling();
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;

async function wsSelectRepo(repoPath) {
  wsState.selectedRepo = repoPath || null;
  wsState.taskFiles = null;
  wsState.selectedFile = null;
  wsState.tasks = [];
  wsState.activeRuns = [];
  wsState.generatedTasksFile = null;
  await renderWorkspaceScreen();
}

async function wsLoadRepoTasks(repoPath) {
  try {
    const data = await api.getRepoTasks(repoPath);
    wsState.taskFiles = data.task_files || [];
    wsState.pipelines = data.pipelines || [];
    if (wsState.taskFiles.length > 0 && !wsState.selectedFile) {
      wsState.selectedFile = wsState.taskFiles[0].path;
    }
    if (wsState.selectedFile) {
      await wsLoadTasksFromFile(wsState.selectedFile);
    }
    const content = $('#ws-content');
    if (content) content.innerHTML = wsRenderTaskArea();
  } catch (e) {
    const content = $('#ws-content');
    if (content) content.innerHTML = `<div class="error-banner">Error loading tasks: ${e.message}</div>`;
  }
}

function wsFormatElapsed(seconds) {
  if (seconds < 60) return `${seconds}s`;
  const m = Math.floor(seconds / 60), s = seconds % 60;
  return s > 0 ? `${m}m ${s}s` : `${m}m`;
}

function wsRenderActiveRuns(runs) {
  if (!runs || runs.length === 0) {
    return '<span class="ws-no-runs">No active runs</span>';
  }
  return runs.map(r => {
    const elapsed = wsFormatElapsed(r.elapsed_seconds || 0);
    const counts = r.task_counts || {};
    const detail = [
      counts.running > 0 ? `${counts.running} running` : null,
      counts.pending > 0 ? `${counts.pending} pending` : null,
    ].filter(Boolean).join(', ');
    return `<div class="ws-run-row">
      <div class="ws-run-spinner"></div>
      <span class="ws-run-name" title="${escapeHtml(r.run_id)}">${escapeHtml(r.task_name || r.run_id)}</span>
      <span class="ws-run-elapsed">${elapsed}</span>
      ${detail ? `<span class="ws-run-id">${escapeHtml(detail)}</span>` : ''}
      <a class="ws-run-link" href="#/run/${encodeURIComponent(r.run_id)}">View</a>
      <button class="btn" style="padding:2px 8px;font-size:0.72rem" onclick="wsCancelRun('${escapeHtml(r.run_id)}')">Cancel</button>
    </div>`;
  }).join('');
}

async function wsLoadActiveRuns() {
  if (!wsState.selectedRepo) return;
  try {
    const data = await api.getActiveRuns(wsState.selectedRepo);
    wsState.activeRuns = data.runs || [];
  } catch (e) {
    wsState.activeRuns = [];
  }
  const el = $('#ws-active-runs');
  if (el) el.innerHTML = wsRenderActiveRuns(wsState.activeRuns);
}

function wsStartActiveRunsPolling() {
  if (wsState.activeRunsInterval) return;
  wsLoadActiveRuns();
  wsState.activeRunsInterval = setInterval(wsLoadActiveRuns, 5000);
}

function wsStopActiveRunsPolling() {
  if (wsState.activeRunsInterval) {
    clearInterval(wsState.activeRunsInterval);
    wsState.activeRunsInterval = null;
  }
}

async function wsCancelRun(runId) {
  if (!confirm(`Cancel run ${runId}?`)) return;
  try {
    await api.cancelRun(runId);
    await wsLoadActiveRuns();
  } catch (e) {
    alert('Cancel failed: ' + e.message);
  }
}

async function wsLoadTasksFromFile(filePath) {
  try {
    const r = await fetch(`${API_BASE}/api/workspace/tasks-file?path=${encodeURIComponent(filePath)}`);
    if (r.ok) {
      const fileData = await r.json();
      wsState.tasks = fileData.tasks || [];
    } else {
      wsState.tasks = [];
    }
  } catch (e) {
    wsState.tasks = [];
  }
}

function wsRenderTaskArea() {
  let html = '';

  // File tabs
  if (wsState.taskFiles && wsState.taskFiles.length > 0) {
    html += '<div class="ws-file-tabs">';
    for (const tf of wsState.taskFiles) {
      const isActive = wsState.selectedFile === tf.path;
      html += `<button class="ws-file-tab ${isActive ? 'active' : ''}" onclick="wsSelectFile('${escapeHtml(tf.path)}')">${escapeHtml(tf.name)} <span class="file-count">(${tf.task_counts.total})</span></button>`;
    }
    html += '</div>';
  }

  // Task grid
  if (wsState.tasks.length === 0) {
    html += '<div class="ws-empty">No tasks in this file. Click "+ New Task" to create one.</div>';
  } else {
    html += '<div class="task-grid">';
    for (const task of wsState.tasks) {
      html += wsTaskCard(task);
    }
    html += '</div>';
  }

  return html;
}

function wsTaskCard(task) {
  const agentTags = task.agents
    ? task.agents.split(',').map(a => `<span class="tag tag-agent">${escapeHtml(a.trim())}</span>`).join('')
    : '';
  const skillTags = task.skills
    ? task.skills.split(',').map(s => `<span class="tag tag-skill">${escapeHtml(s.trim())}</span>`).join('')
    : '';
  const hookBadge = task.hooks
    ? `<span class="tag">${escapeHtml(task.hooks)}</span>`
    : '';
  const promptPreview = task.prompt
    ? escapeHtml(task.prompt.substring(0, 100) + (task.prompt.length > 100 ? '...' : ''))
    : '<em style="color:var(--text-dim)">No prompt</em>';
  const taskId = escapeHtml(task.id);
  const filePath = escapeHtml(wsState.selectedFile || '');

  return `<div class="ws-task-card">
    <div class="ws-task-header">
      ${statusBadge(task.status)}
      <span class="ws-task-name">${escapeHtml(task.name)}</span>
      ${modelBadge(task.model)}
    </div>
    <div class="ws-task-tags">${agentTags}${skillTags}${hookBadge}</div>
    <div class="ws-task-prompt">${promptPreview}</div>
    <div class="ws-task-actions">
      <button class="btn btn-sm btn-success" onclick="wsRunTask('${taskId}', '${filePath}')">Run</button>
      <button class="btn btn-sm" onclick="wsEditTask('${taskId}')">Edit</button>
      <button class="btn btn-sm btn-danger" onclick="wsDeleteTask('${taskId}', '${filePath}')">Delete</button>
    </div>
  </div>`;
}

async function wsSelectFile(filePath) {
  wsState.selectedFile = filePath;
  wsState.tasks = [];
  await wsLoadTasksFromFile(filePath);
  const content = $('#ws-content');
  if (content) content.innerHTML = wsRenderTaskArea();
}

async function wsRunTask(taskId, filePath) {
  if (!confirm(`Run task "${taskId}"?`)) return;
  try {
    const result = await api.runTask(taskId, filePath, wsState.selectedRepo);
    alert(`Task started! Run ID: ${result.run_id || 'unknown'}\nCheck the Runs tab for progress.`);
    wsLoadActiveRuns();
  } catch (e) {
    alert('Failed to run task: ' + e.message);
  }
}

async function wsDeleteTask(taskId, filePath) {
  if (!confirm(`Delete task "${taskId}"? This cannot be undone.`)) return;
  try {
    await api.deleteTask(taskId, filePath);
    wsState.taskFiles = null;
    await wsLoadRepoTasks(wsState.selectedRepo);
  } catch (e) {
    alert('Failed to delete task: ' + e.message);
  }
}

async function wsEditTask(taskId) {
  const task = wsState.tasks.find(t => t.id === taskId);
  if (!task) { alert('Task not found'); return; }
  wsShowTaskModal(task, false);
}

async function wsNewTask() {
  if (!wsState.selectedRepo) { alert('Select a repository first'); return; }
  wsShowTaskModal({
    id: '',
    name: '',
    prompt: '',
    model: 'opus',
    workdir: wsState.selectedRepo,
    agents: '',
    skills: '',
    hooks: 'standard',
  }, true);
}

async function wsShowTaskModal(task, isNew) {
  const existing = document.querySelector('.modal-overlay');
  if (existing) existing.remove();

  // Load agents and skills for checkboxes if not cached
  if (!wsState.agents) {
    try { wsState.agents = (await api.getAgents()).agents || []; } catch (_) { wsState.agents = []; }
  }
  if (!wsState.skills) {
    try { wsState.skills = (await api.getSkills()).skills || []; } catch (_) { wsState.skills = []; }
  }

  const selectedAgents = new Set((task.agents || '').split(',').map(a => a.trim()).filter(Boolean));
  const selectedSkills = new Set((task.skills || '').split(',').map(s => s.trim()).filter(Boolean));

  const agentChecks = wsState.agents.map(a => {
    const checked = selectedAgents.has(a.name);
    return `<label class="ws-check ${checked ? 'checked' : ''}"><input type="checkbox" value="${escapeHtml(a.name)}" ${checked ? 'checked' : ''} onchange="this.parentElement.classList.toggle('checked',this.checked)">${escapeHtml(a.name)}</label>`;
  }).join('');

  const skillChecks = wsState.skills.map(s => {
    const checked = selectedSkills.has(s.name);
    return `<label class="ws-check ${checked ? 'checked' : ''}"><input type="checkbox" value="${escapeHtml(s.name)}" ${checked ? 'checked' : ''} onchange="this.parentElement.classList.toggle('checked',this.checked)">${escapeHtml(s.name)}</label>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  overlay.innerHTML = `<div class="modal" style="max-width:750px">
    <div class="modal-header">
      <h3>${isNew ? 'New Task' : 'Edit Task: ' + escapeHtml(task.name)}</h3>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" id="ws-modal-name" value="${escapeHtml(task.name)}" placeholder="Task name" ${!isNew ? 'readonly style="opacity:0.6"' : ''}>
      </div>
      <div class="form-group">
        <label class="form-label">Prompt</label>
        <textarea class="form-textarea" id="ws-modal-prompt" style="min-height:150px">${escapeHtml(task.prompt || '')}</textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Model</label>
          <select class="form-input" id="ws-modal-model">
            <option value="opus" ${task.model === 'opus' ? 'selected' : ''}>opus</option>
            <option value="sonnet" ${task.model === 'sonnet' ? 'selected' : ''}>sonnet</option>
            <option value="haiku" ${task.model === 'haiku' ? 'selected' : ''}>haiku</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Hooks</label>
          <select class="form-input" id="ws-modal-hooks">
            <option value="" ${!task.hooks ? 'selected' : ''}>none</option>
            <option value="strict" ${task.hooks === 'strict' ? 'selected' : ''}>strict</option>
            <option value="standard" ${task.hooks === 'standard' ? 'selected' : ''}>standard</option>
            <option value="minimal" ${task.hooks === 'minimal' ? 'selected' : ''}>minimal</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Workdir</label>
          <input type="text" class="form-input" id="ws-modal-workdir" value="${escapeHtml(task.workdir || wsState.selectedRepo || '')}" placeholder="/path/to/repo">
        </div>
      </div>
      <div class="form-group">
        <div class="ws-section-title">Agents ${agentChecks ? '' : '<span style="opacity:0.5">(none available)</span>'}</div>
        <div class="ws-checks" id="ws-modal-agents">${agentChecks || '<span style="color:var(--text-dim);font-size:0.75rem">No agents found</span>'}</div>
      </div>
      <div class="form-group">
        <div class="ws-section-title">Skills ${skillChecks ? '' : '<span style="opacity:0.5">(none available)</span>'}</div>
        <div class="ws-checks" id="ws-modal-skills">${skillChecks || '<span style="color:var(--text-dim);font-size:0.75rem">No skills found</span>'}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      ${!isNew ? `<button class="btn btn-success" id="ws-modal-run">Save & Run</button>` : ''}
      <button class="btn btn-primary" id="ws-modal-save">${isNew ? 'Create' : 'Save'}</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);
  setTimeout(() => {
    const focusEl = isNew ? overlay.querySelector('#ws-modal-name') : overlay.querySelector('#ws-modal-prompt');
    if (focusEl) focusEl.focus();
  }, 50);

  const collectFormData = () => {
    const name = overlay.querySelector('#ws-modal-name').value.trim();
    const prompt = overlay.querySelector('#ws-modal-prompt').value;
    const model = overlay.querySelector('#ws-modal-model').value;
    const hooks = overlay.querySelector('#ws-modal-hooks').value;
    const workdir = overlay.querySelector('#ws-modal-workdir').value.trim();
    const agents = Array.from(overlay.querySelectorAll('#ws-modal-agents input:checked')).map(cb => cb.value).join(', ');
    const skills = Array.from(overlay.querySelectorAll('#ws-modal-skills input:checked')).map(cb => cb.value).join(', ');
    return { name, prompt, model, hooks, workdir, agents, skills };
  };

  const slugify = (str) => str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

  overlay.querySelector('#ws-modal-save').onclick = async () => {
    const form = collectFormData();
    if (!form.name) { alert('Name is required'); return; }

    const saveBtn = overlay.querySelector('#ws-modal-save');
    saveBtn.textContent = 'Saving...';
    saveBtn.disabled = true;

    try {
      const filePath = wsState.selectedFile || (wsState.selectedRepo + '/tasks.json');
      if (isNew) {
        const taskData = {
          id: slugify(form.name),
          name: form.name,
          prompt: form.prompt,
          model: form.model,
          workdir: form.workdir,
        };
        if (form.agents) taskData.agents = form.agents;
        if (form.skills) taskData.skills = form.skills;
        if (form.hooks) taskData.hooks = form.hooks;
        await api.createTask(filePath, taskData);
      } else {
        const fields = {
          name: form.name,
          prompt: form.prompt,
          model: form.model,
          workdir: form.workdir,
          agents: form.agents,
          skills: form.skills,
          hooks: form.hooks,
        };
        await api.updateTask(task.id, filePath, fields);
      }
      overlay.remove();
      wsState.taskFiles = null;
      await wsLoadRepoTasks(wsState.selectedRepo);
    } catch (e) {
      alert('Save failed: ' + e.message);
      saveBtn.textContent = isNew ? 'Create' : 'Save';
      saveBtn.disabled = false;
    }
  };

  // Save & Run button (edit mode only)
  const runBtn = overlay.querySelector('#ws-modal-run');
  if (runBtn) {
    runBtn.onclick = async () => {
      const form = collectFormData();
      if (!form.name) { alert('Name is required'); return; }

      runBtn.textContent = 'Saving...';
      runBtn.disabled = true;

      try {
        const filePath = wsState.selectedFile || (wsState.selectedRepo + '/tasks.json');
        const fields = {
          name: form.name, prompt: form.prompt, model: form.model, workdir: form.workdir,
          agents: form.agents, skills: form.skills, hooks: form.hooks,
        };
        await api.updateTask(task.id, filePath, fields);

        runBtn.textContent = 'Running...';
        const result = await api.runTask(task.id, filePath, wsState.selectedRepo);
        overlay.remove();
        alert(`Task started! Run ID: ${result.run_id || 'unknown'}\nCheck the Runs tab.`);
        wsLoadActiveRuns();
        wsState.taskFiles = null;
        await wsLoadRepoTasks(wsState.selectedRepo);
      } catch (e) {
        alert('Failed: ' + e.message);
        runBtn.textContent = 'Save & Run';
        runBtn.disabled = false;
      }
    };
  }

  // Esc to close
  const escHandler = (e) => {
    if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); }
  };
  document.addEventListener('keydown', escHandler);
}

function wsSetProgress(msg) {
  wsState.wsProgressMessage = msg;
  const el = $('#wsBrainstormProgress');
  if (el) el.textContent = msg;
}

function wsBrainstormBtnLabel(mode) {
  if (mode === 'stage-tasks') return 'Generate';
  if (mode === 'pipeline-template' || mode === 'pipeline-custom') return 'Generate & Run';
  return 'Brainstorm & Edit';
}

function wsBrainstormModeFieldsHtml(mode) {
  if (mode === 'pipeline-template') {
    return `<div class="ws-brainstorm-mode-fields" style="margin-bottom:10px">
      <select id="ws-bs-template-name" style="width:100%">
        <option value="feature">feature</option>
        <option value="bugfix">bugfix</option>
        <option value="audit">audit</option>
        <option value="refactor">refactor</option>
        <option value="release">release</option>
      </select>
    </div>`;
  }
  if (mode === 'pipeline-custom') {
    return `<div class="ws-brainstorm-mode-fields" style="margin-bottom:10px">
      <label>Pipeline name</label>
      <input id="ws-bs-pipeline-name" placeholder="my-pipeline">
      <label>Stages (comma-separated)</label>
      <input id="ws-bs-stages" placeholder="Plan, Implement, Review">
    </div>`;
  }
  if (mode === 'stage-tasks') {
    const pipelines = wsState.repoPipelines || [];
    const pipelineOpts = pipelines.length > 0
      ? pipelines.map(p => `<option value="${escapeHtml(p.path)}">${escapeHtml(p.name || p.file)}</option>`).join('')
      : '<option value="">— no pipelines —</option>';
    const firstPipeline = pipelines[0];
    const stageNames = (firstPipeline && firstPipeline.stage_names) || [];
    const stageOpts = stageNames.length > 0
      ? stageNames.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')
      : '<option value="">— select pipeline first —</option>';
    return `<div class="ws-brainstorm-mode-fields" style="margin-bottom:10px">
      <label>Pipeline</label>
      <select id="ws-bs-pipeline-path" onchange="wsRenderBrainstormStageDropdown()">${pipelineOpts}</select>
      <label>Stage</label>
      <select id="ws-bs-stage-name">${stageOpts}</select>
    </div>`;
  }
  return '';
}

async function wsBrainstormPipelineTemplate() {
  const promptEl = $('#ws-brainstorm-prompt');
  const templateEl = $('#ws-bs-template-name');
  if (!promptEl?.value.trim()) { alert('Enter a prompt'); return; }
  if (!templateEl?.value.trim()) { alert('Enter a template name'); return; }
  if (!wsState.selectedRepo) { alert('Select a repository first'); return; }
  const panel = promptEl.closest('.ws-brainstorm');
  panel.classList.add('loading');
  wsSetProgress('Generating pipeline tasks...');
  try {
    const result = await api.brainstormPipeline(wsState.selectedRepo, promptEl.value.trim(), { template_name: templateEl.value.trim() });
    const stages = result.stages || [];
    for (let i = 0; i < stages.length; i++) {
      wsSetProgress(`Generating tasks for Stage ${i + 1}/${stages.length}: ${stages[i].name || stages[i].file || ''}...`);
    }
    if (stages.length) wsSetProgress(`Generated ${stages.length} stage${stages.length !== 1 ? 's' : ''}. Starting pipeline...`);
    const runResult = await api.runPipeline(result.pipeline_path || result.path);
    wsSetProgress(`Pipeline started! Run ID: ${runResult.run_id || 'unknown'}`);
    wsLoadActiveRuns();
    location.hash = '#/runs';
  } catch (e) {
    wsSetProgress('');
    alert('Brainstorm pipeline failed: ' + e.message);
  } finally {
    panel.classList.remove('loading');
  }
}

async function wsBrainstorm() {
  const mode = wsState.wsBrainstormMode || 'orchestra';
  if (mode === 'pipeline-template') return wsBrainstormPipelineTemplate();
  if (mode === 'pipeline-custom') return wsBrainstormPipelineCustom();
  if (mode === 'stage-tasks') return wsBrainstormStage();

  const promptEl = $('#ws-brainstorm-prompt');
  const modelEl = $('#ws-brainstorm-model');
  if (!promptEl || !promptEl.value.trim()) { alert('Enter a prompt'); return; }
  if (!wsState.selectedRepo) { alert('Select a repository first'); return; }

  const panel = promptEl.closest('.ws-brainstorm');
  panel.classList.add('loading');
  wsSetProgress('Generating tasks...');
  try {
    const result = await api.brainstorm(wsState.selectedRepo, promptEl.value.trim(), modelEl.value);
    wsSetProgress('');
    wsState.generatedTasksFile = result.tasks_file || null;
    const container = $('#ws-tasks-md-container');
    const tasksMdEl = $('#ws-tasks-md');
    const taskCountEl = $('#ws-task-count');
    const fileHeaderEl = $('#ws-tasks-md-filename');
    tasksMdEl.value = result.tasks_md || '';
    const taskCount = (result.tasks_md || '').split('\n').filter(l => l.startsWith('## ')).length;
    taskCountEl.textContent = taskCount ? `${taskCount} task${taskCount !== 1 ? 's' : ''}` : '';
    if (fileHeaderEl && result.tasks_filename) {
      fileHeaderEl.textContent = result.tasks_filename;
      fileHeaderEl.title = result.tasks_file || '';
    }
    container.style.display = 'block';
  } catch (e) {
    wsSetProgress('');
    alert('Brainstorm failed: ' + e.message);
  } finally {
    panel.classList.remove('loading');
  }
}

async function wsSaveTasksMd() {
  const tasksMdEl = $('#ws-tasks-md');
  if (!wsState.selectedRepo) { alert('Select a repository first'); return; }
  const filePath = wsState.generatedTasksFile || (wsState.selectedRepo + '/tasks.md');

async function wsRunOrchestra() {
  if (!wsState.selectedRepo) { alert('Select a repository first'); return; }
  const tasksMdEl = $('#ws-tasks-md');
  const tasksMdPath = wsState.generatedTasksFile || (wsState.selectedRepo + '/tasks.md');
  const baseName = tasksMdPath.replace(/\.md$/, '');
  const tasksJsonPath = baseName + '.json';
  try {
    await api.saveTasksMd(tasksMdPath, tasksMdEl.value);
    await api.convertTasksMd(tasksMdPath, tasksJsonPath);
    const result = await api.runOrchestra(tasksJsonPath, 5, wsState.selectedRepo);
    alert(`Orchestra started! Run ID: ${result.run_id || 'unknown'}\nCheck the Runs tab.`);
    wsState.taskFiles = null;
    wsLoadActiveRuns();
    await wsLoadRepoTasks(wsState.selectedRepo);
  } catch (e) {
    alert('Orchestra failed: ' + e.message);
  }
}

async function wsRunPipeline(pipelinePath) {
  if (!pipelinePath) { alert('No pipeline specified'); return; }
  if (!confirm(`Run pipeline: ${pipelinePath}?\n\nThis will execute the pipeline stages sequentially.`)) return;
  try {
    const result = await api.runPipeline(pipelinePath);
    alert(`Pipeline started! Run ID: ${result.run_id || 'unknown'}\nCheck the Runs tab.`);
    wsLoadActiveRuns();
  } catch (e) {
    alert('Pipeline failed: ' + e.message);
  }
}

async function wsUseTemplate() {
  const sel = $('#ws-pipeline-template');
  if (!sel || !sel.value) { alert('Choose a template first'); return; }
  const name = sel.value;
  const template = (wsState.pipelineTemplates || []).find(t => t.name === name);
  if (!template) return;
  const targetDir = wsState.selectedRepo || '.';
  const stages = (template.stages || []).join(' → ');
  const msg = `Template: ${name}\nDescription: ${template.description || ''}\nStages: ${stages}\n\nThis will create:\n  ${targetDir}/pipeline-${name}.json\n\nContinue?`;
  if (!confirm(msg)) return;
  try {
    const r = await fetch(`${API_BASE}/api/pipelines/templates/${encodeURIComponent(name)}/create`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dest_dir: targetDir })
    });
    if (r.ok) {
      const result = await r.json();
      alert(`Pipeline created: ${result.path || `pipeline-${name}.json`}`);
    } else {
      // Fallback: show the template JSON in the docs panel for manual copy
      const pipelineJson = JSON.stringify({
        name: template.name,
        stages: (template.stages || []).map(s => ({
          name: s,
          tasks: [{ file: `tasks-${s.toLowerCase()}.json`, max_parallel: 3 }],
          pass_outputs_to_next: true
        })),
        aggregate: true
      }, null, 2);
      const docsEl = $('#ws-pipeline-docs');
      if (docsEl) {
        const parentDetails = docsEl.closest('details');
        if (parentDetails) parentDetails.open = true;
        docsEl.textContent = `# Template: ${name} — copy to pipeline-${name}.json\n\n${pipelineJson}`;
      }
      alert('API endpoint not available — template JSON shown in the docs panel.');
    }
  } catch (e) {
    alert('Failed to use template: ' + e.message);
  }
}

let pipelineEventSource = null;
let selectedTrainStage = null;

async function renderPipelineView(pipelineId) {
  const app = $('#app');

function renderPipelineTrainDOM(app, pipeline, pipelineId) {
  const statuses = pipeline.stages.map(s => s.status);
  const overallStatus = statuses.includes('running') ? 'running'
    : statuses.includes('failed') ? 'failed'
    : statuses.every(s => s === 'done') ? 'done' : 'pending';
  const totalCost = pipeline.stages.reduce((sum, s) => sum + (s.cost_usd || 0), 0);

  let html = `<div class="pipeline-header">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <h2 style="margin:0">${escapeHtml(pipeline.name || 'Pipeline')}</h2>
      ${statusBadge(overallStatus)}
    </div>
    <div class="pipeline-meta">
      <span>${formatDate(pipeline.started_at_iso)} ${formatTime(pipeline.started_at_iso)}</span>
      <span>${pipeline.stages.length} stages</span>
      ${totalCost > 0 ? `<span>total cost: <strong style="color:var(--text)">${formatCost(totalCost)}</strong></span>` : ''}
    </div>
  </div>`;

  // Train visualization
  html += '<div class="train-container" id="train-container">';
  pipeline.stages.forEach((stage, i) => {
    const taskCount = stage.tasks ? stage.tasks.length : 0;
    const doneCount = stage.tasks ? stage.tasks.filter(t => t.status === 'done').length : 0;
    const stageCost = stage.cost_usd || 0;

    // Connector between cars
    if (i > 0) {
      const prevDone = pipeline.stages[i - 1].status === 'done';
      html += `<div class="train-connector${prevDone ? ' active' : ''}" data-connector="${i}">
        <div class="train-connector-line"><div class="train-connector-arrow"></div></div>
      </div>`;
    }

    const selectedClass = selectedTrainStage === i ? ' selected' : '';
    html += `<div class="train-car ${stage.status}${selectedClass}" data-stage="${i}" onclick="selectTrainStage(${i})">
      <div class="train-car-header">
        <span class="train-car-num">Stage ${i + 1}</span>
        ${statusBadge(stage.status)}
      </div>
      <div class="train-car-name">${escapeHtml(stage.name)}</div>
      <div class="train-car-stats">
        <span>${taskCount} task${taskCount !== 1 ? 's' : ''}${doneCount > 0 && doneCount < taskCount ? ` (${doneCount} done)` : ''}</span>
        ${stageCost > 0 ? `<span>${formatCost(stageCost)}</span>` : ''}
      </div>
      ${taskCount > 0 ? '<div class="train-car-expand">Click to view tasks</div>' : ''}
    </div>`;
  });
  html += '</div>';

  // Task breakdown panel placeholder
  html += '<div id="train-tasks-panel"></div>';

  // Overall summary section
  html += '<div id="pipeline-summary-section" class="pipeline-summary-section" style="margin-top:20px"></div>';

  // Pipeline config summary
  html += `<details class="collapsible" style="margin-top:16px">
    <summary>Pipeline Config</summary>
    <div class="section-content">
      <pre style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;overflow-x:auto;font-size:0.8rem"><code class="language-json">${escapeHtml(JSON.stringify({
        name: pipeline.name,
        pipeline_file: pipeline.pipeline_file,
        stages: pipeline.stages.map(s => ({
          name: s.name,
          status: s.status,
          run_ids: s.run_ids,
          task_files: s.task_files,
          pass_outputs_to_next: s.pass_outputs_to_next
        }))
      }, null, 2))}</code></pre>
    </div>
  </details>`;

  app.innerHTML = html;
  if (window.hljs) {
    app.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
  }

  // Re-render task panel if a stage was selected
  if (selectedTrainStage !== null) {
    renderTrainTasksPanel(pipeline, selectedTrainStage);
  }

  // Load and render the summary section
  loadPipelineSummary(pipelineId, pipeline);
}

async function loadPipelineSummary(pipelineId, pipeline) {
  const section = document.getElementById('pipeline-summary-section');
  if (!section) return;

  // Check if pipeline is in a terminal state
  const statuses = pipeline.stages.map(s => s.status);
  const isTerminal = statuses.length > 0 && statuses.every(s => s === 'done' || s === 'failed' || s === 'skipped');

  if (!isTerminal) {
    section.innerHTML = '';
    return;
  }

  // Check if summary exists
  try {
    const data = await api.getPipelineSummary(pipelineId);
    if (data.summary) {
      renderPipelineSummaryContent(section, data.summary);
    } else {
      renderPipelineSummaryButton(section, pipelineId);
    }
  } catch (e) {
    renderPipelineSummaryButton(section, pipelineId);
  }
}

async function generatePipelineSummary(pipelineId) {
  const btn = document.getElementById('generate-summary-btn');
  const errDiv = document.getElementById('summary-error');
  if (!btn) return;

  btn.disabled = true;
  btn.textContent = 'Generating summary...';
  if (errDiv) errDiv.style.display = 'none';

  try {
    const data = await api.generatePipelineSummary(pipelineId);
    if (data.skipped) {
      const section = document.getElementById('pipeline-summary-section');
      if (section) {
        section.innerHTML = `
          <div class="pipeline-summary-card">
            <div class="pipeline-summary-header">
              <h3 style="margin:0;display:flex;align-items:center;gap:8px">
                <span style="color:var(--accent)">Overall Summary</span>
              </h3>
            </div>
            <div class="pipeline-summary-body" style="padding:16px;color:var(--text-muted);font-size:0.85rem">
              No task output available — summary not generated.
            </div>
          </div>`;
      }
      return;
    }
    if (data.summary) {
      const section = document.getElementById('pipeline-summary-section');
      if (section) renderPipelineSummaryContent(section, data.summary);
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Generate summary';
    if (errDiv) {
      errDiv.textContent = `Error: ${e.message}. Click to retry.`;
      errDiv.style.display = 'block';
    }
  }
}

function selectTrainStage(idx) {
  const currentHash = location.hash;
  const pipelineId = currentHash.match(/^#\/pipeline\/([^/]+)$/)?.[1];
  if (!pipelineId) return;
  const pipeline = cache.pipelineDetails[pipelineId];
  if (!pipeline) return;

  // Toggle selection
  if (selectedTrainStage === idx) {
    selectedTrainStage = null;
    document.getElementById('train-tasks-panel').innerHTML = '';
    document.querySelectorAll('.train-car').forEach(el => el.classList.remove('selected'));
    return;
  }

  selectedTrainStage = idx;

  // Update visual selection
  document.querySelectorAll('.train-car').forEach(el => el.classList.remove('selected'));
  const car = document.querySelector(`.train-car[data-stage="${idx}"]`);
  if (car) car.classList.add('selected');

  renderTrainTasksPanel(pipeline, idx);
}

function renderTrainTasksPanel(pipeline, stageIdx) {
  const panel = document.getElementById('train-tasks-panel');
  if (!panel) return;
  const stage = pipeline.stages[stageIdx];
  if (!stage) return;

  const tasks = stage.tasks || [];
  if (tasks.length === 0) {
    panel.innerHTML = `<div class="train-tasks-panel">
      <div class="train-tasks-header">
        <h3>${escapeHtml(stage.name)}</h3>
        ${statusBadge(stage.status)}
      </div>
      <div style="padding:16px;color:var(--text-muted);font-family:var(--mono);font-size:0.8rem">No tasks in this stage</div>
    </div>`;
    return;
  }

  const runLinks = (stage.run_ids || []).map(rid =>
    `<a class="btn" href="#/run/${escapeHtml(rid)}" style="font-size:0.7rem;padding:3px 8px;margin-left:8px">View Run</a>`
  ).join('');

  let rows = '';
  for (const t of tasks) {
    const outputHref = t.run_id && t.id
      ? `#/run/${escapeHtml(t.run_id)}/${escapeHtml(t.id)}/output`
      : '';
    rows += `<div class="train-task-row"${outputHref ? ` onclick="location.hash='${outputHref}'"` : ''}>
      ${statusBadge(t.status)}
      <span class="train-task-name">${escapeHtml(t.name)}</span>
      ${t.cost_usd != null ? `<span class="train-task-cost">${formatCost(t.cost_usd)}</span>` : ''}
      ${outputHref ? '<span class="train-task-link">View output</span>' : ''}
    </div>`;
  }

  panel.innerHTML = `<div class="train-tasks-panel">
    <div class="train-tasks-header">
      <h3>${escapeHtml(stage.name)}</h3>
      ${statusBadge(stage.status)}
      ${stage.cost_usd != null ? `<span style="color:var(--text-muted);font-size:0.8rem;margin-left:auto">${formatCost(stage.cost_usd)}</span>` : ''}
      ${runLinks}
    </div>
    <div class="train-tasks-list">${rows}</div>
  </div>`;
}

function connectPipelineSSE(pipelineId, app) {
  if (typeof EventSource === 'undefined') return;

  try {
    pipelineEventSource = new EventSource(`${API_BASE}/api/events`);

    pipelineEventSource.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        // Only handle events for this pipeline
        if (data.pipeline_id !== pipelineId) return;

        // Refresh pipeline data and re-render
        cache.pipelineDetails[pipelineId] = null;
        api.getPipeline(pipelineId).then(pipeline => {
          cache.pipelineDetails[pipelineId] = pipeline;
          // Only re-render if still on this pipeline view
          if (location.hash === `#/pipeline/${pipelineId}`) {
            renderPipelineTrainDOM(app, pipeline, pipelineId);
          }
        }).catch(() => {});
      } catch (_) {}
    };

    pipelineEventSource.addEventListener('stage_update', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.pipeline_id !== pipelineId) return;
        updateTrainCarStatus(data.stage_index, data.status);
      } catch (_) {}
    });

    pipelineEventSource.addEventListener('task_update', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.pipeline_id !== pipelineId) return;
        // Refresh full pipeline for task-level updates
        cache.pipelineDetails[pipelineId] = null;
        api.getPipeline(pipelineId).then(pipeline => {
          cache.pipelineDetails[pipelineId] = pipeline;
          if (location.hash === `#/pipeline/${pipelineId}`) {
            renderPipelineTrainDOM(app, pipeline, pipelineId);
          }
        }).catch(() => {});
      } catch (_) {}
    });

    pipelineEventSource.addEventListener('pipeline_summary_ready', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.pipeline_id !== pipelineId) return;
        // Refresh summary section
        const section = document.getElementById('pipeline-summary-section');
        if (section) {
          api.getPipelineSummary(pipelineId).then(result => {
            if (result.summary) renderPipelineSummaryContent(section, result.summary);
          }).catch(() => {});
        }
      } catch (_) {}
    });

    pipelineEventSource.addEventListener('pipeline_summary_error', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.pipeline_id !== pipelineId) return;
        const section = document.getElementById('pipeline-summary-section');
        if (section) renderPipelineSummaryButton(section, pipelineId);
      } catch (_) {}
    });

    pipelineEventSource.onerror = function() {
      // Silently close on error; user can refresh
      if (pipelineEventSource) {
        pipelineEventSource.close();
        pipelineEventSource = null;
      }
    };
  } catch (_) {
    // EventSource not supported or connection failed — non-fatal
  }
}

function updateTrainCarStatus(stageIdx, newStatus) {
  const car = document.querySelector(`.train-car[data-stage="${stageIdx}"]`);
  if (!car) return;
  car.classList.remove('pending', 'running', 'done', 'failed');
  car.classList.add(newStatus);
  // Update badge inside the car
  const badge = car.querySelector('.badge');
  if (badge) {
    badge.className = `badge badge-${newStatus}`;
    badge.textContent = newStatus.toUpperCase();
  }
  // Update connector to the right if stage is done
  if (newStatus === 'done') {
    const nextConnector = document.querySelector(`.train-connector[data-connector="${stageIdx + 1}"]`);
    if (nextConnector) nextConnector.classList.add('active');
  }
}

// ── Pipeline Mapper ──
let mapperEventSource = null;
const mapperState = {
  repos: null,
  selectedRepo: null,
  taskFiles: null,
  selectedTaskFiles: [],  // Changed from selectedTasksFile (single) to array
  pipelineTemplates: null,
  selectedTemplate: null,
  customStagesInput: '',  // User-provided custom stages
  mappingId: null,
  tasks: [],
  stages: [],
  assignments: {},       // task_id -> stage_index
  executedTasks: new Set(),
  selectedBatch: new Set(),
  history: [],
  selectAllMapped: false,
  loadedTaskFiles: []    // Track files loaded from generate & map
};

async function renderMapperScreen() {
  const app = $('#app');
  setBreadcrumb({ text: 'Pipeline Mapper' });
  app.innerHTML = '<div class="loading">Loading mapper...</div>';

  try {
    // Load repos if needed
    if (!mapperState.repos) {
      const data = await api.getRepos();
      mapperState.repos = data.repos || [];
    }
    // Load pipeline templates if needed
    if (!mapperState.pipelineTemplates) {
      try { mapperState.pipelineTemplates = (await api.getPipelineTemplates()).templates || []; } catch (_) { mapperState.pipelineTemplates = []; }
    }

    let html = '';

    // ── Setup Panel ──
    const repoOptions = mapperState.repos.map(r =>
      `<option value="${escapeHtml(r.path)}" ${mapperState.selectedRepo === r.path ? 'selected' : ''}>${escapeHtml(r.name)} (${escapeHtml(r.path)})</option>`
    ).join('');

    const templateOptions = mapperState.pipelineTemplates.map(t =>
      `<option value="${escapeHtml(t.name)}" ${mapperState.selectedTemplate === t.name ? 'selected' : ''}>${escapeHtml(t.name)} — ${escapeHtml(t.description || '')}</option>`
    ).join('') + '<option value="custom" ' + (mapperState.selectedTemplate === 'custom' ? 'selected' : '') + '>custom — Define your own stages</option>';

    // Build task file options, excluding already selected files
    const availableTaskFiles = (mapperState.taskFiles || []).filter(tf => 
      !mapperState.selectedTaskFiles.includes(tf.path)
    );
    const taskFileOptions = availableTaskFiles.map(tf =>
      `<option value="${escapeHtml(tf.path)}">${escapeHtml(tf.name)} (${tf.task_counts.total} tasks)${tf.is_markdown ? ' [MD]' : ''}</option>`
    ).join('');

    // Build selected files display (removable tags)
    const selectedFilesHtml = mapperState.selectedTaskFiles.map(fp => {
      const tf = (mapperState.taskFiles || []).find(t => t.path === fp);
      const name = tf ? tf.name : fp.split('/').pop();
      const taskCount = tf ? tf.task_counts.total : '?';
      return `<span class="mapper-file-tag">
        ${escapeHtml(name)} <span style="color:var(--text-dim)">(${taskCount})</span>
        <button class="mapper-file-remove" onclick="mapperRemoveTaskFile('${escapeHtml(fp)}')" title="Remove">×</button>
      </span>`;
    }).join('');

    html += `<div style="margin-bottom:28px;animation:stagger-in 0.5s ease-out">
      <h1 class="hero-title" style="font-family:var(--display);font-size:2.5rem;font-weight:700;letter-spacing:-0.04em;line-height:1;color:var(--text);margin-bottom:4px">
        <span style="color:var(--orange)">MAP</span><span style="color:var(--text-dim)">//</span>PER
      </h1>
      <p style="font-family:var(--mono);font-size:0.78rem;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase">Drag tasks to pipeline stages</p>
    </div>`;
    html += `<div class="mapper-setup">
      <h3>Pipeline Mapper</h3>
      <div class="mapper-setup-row">
        <div class="mapper-setup-field">
          <label>Repository</label>
          <select id="mapper-repo" onchange="mapperSelectRepo(this.value)">
            <option value="">-- select repo --</option>
            ${repoOptions}
          </select>
        </div>
        <div class="mapper-setup-field">
          <label>Tasks Files</label>
          <div class="mapper-tasks-files">
            <select id="mapper-tasks-file" ${!mapperState.taskFiles || availableTaskFiles.length === 0 ? 'disabled' : ''}>
              <option value="">-- select file to add --</option>
              ${taskFileOptions}
            </select>
            <button class="btn" onclick="mapperAddTaskFile()" ${!mapperState.taskFiles || availableTaskFiles.length === 0 ? 'disabled' : ''}>Add</button>
          </div>
          ${selectedFilesHtml ? `<div class="mapper-selected-files">${selectedFilesHtml}</div>` : ''}
        </div>
        <div class="mapper-setup-field">
          <label>Pipeline Template</label>
          <select id="mapper-template" onchange="mapperSelectTemplate(this.value)">
            <option value="">-- select template --</option>
            ${templateOptions}
          </select>
          ${mapperState.selectedTemplate === 'custom' ? `
            <div class="mapper-custom-stages" style="margin-top:8px">
              <label style="font-size:0.85rem">Custom Stages (comma-separated)</label>
              <input type="text" id="mapper-custom-stages" class="form-input" placeholder="Plan, Implement, Review" style="width:100%;margin-top:4px" value="${escapeHtml(mapperState.customStagesInput || '')}">
            </div>
          ` : ''}
        </div>
        <button class="btn btn-primary" onclick="mapperCreateMapping()" ${mapperState.selectedTaskFiles.length === 0 || !mapperState.selectedTemplate ? 'disabled style="opacity:0.4"' : ''}>Create Mapping</button>
      </div>
    </div>`;

    // ── Mapping Area (only shown after mapping is created) ──
    if (mapperState.mappingId && mapperState.stages.length > 0) {
      html += mapperRenderMappingArea();
      html += mapperRenderBatchBar();
      html += mapperRenderHistory();
    } else if (mapperState.mappingId) {
      html += '<div style="color:var(--text-muted);font-family:var(--mono);padding:40px;text-align:center">No stages found in the selected template.</div>';
    }

    app.innerHTML = html;

    // Attach drag-and-drop listeners after DOM is rendered
    if (mapperState.mappingId) {
      mapperAttachDragDrop();
    }
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

async function mapperSelectRepo(repoPath) {
  mapperState.selectedRepo = repoPath || null;
  mapperState.taskFiles = null;
  mapperState.selectedTaskFiles = [];
  mapperResetMapping();

  if (repoPath) {
    try {
      const data = await api.getRepoTasks(repoPath);
      mapperState.taskFiles = data.task_files || [];
      
      // Auto-select files that were loaded from generate & map
      if (mapperState.loadedTaskFiles && mapperState.loadedTaskFiles.length > 0) {
        mapperState.selectedTaskFiles = mapperState.loadedTaskFiles.filter(fp => 
          mapperState.taskFiles.some(tf => tf.path === fp)
        );
        mapperState.loadedTaskFiles = [];  // Clear after use
      }
    } catch (_) {
      mapperState.taskFiles = [];
    }
  }
  renderMapperScreen();
}

function mapperAddTaskFile() {
  const select = document.getElementById('mapper-tasks-file');
  if (!select || !select.value) return;
  
  const filePath = select.value;
  if (!mapperState.selectedTaskFiles.includes(filePath)) {
    mapperState.selectedTaskFiles.push(filePath);
    mapperResetMapping();
  }
  renderMapperScreen();
}

function mapperRemoveTaskFile(filePath) {
  mapperState.selectedTaskFiles = mapperState.selectedTaskFiles.filter(fp => fp !== filePath);
  mapperResetMapping();
  renderMapperScreen();
}

function mapperSelectTasksFile(filePath) {
  // Legacy function - now adds to the array instead of replacing
  if (filePath && !mapperState.selectedTaskFiles.includes(filePath)) {
    mapperState.selectedTaskFiles = [filePath];
  } else if (!filePath) {
    mapperState.selectedTaskFiles = [];
  }
  mapperResetMapping();
  renderMapperScreen();
}

function mapperSelectTemplate(template) {
  // Save custom stages input before changing template
  const customStagesEl = document.getElementById('mapper-custom-stages');
  if (customStagesEl) {
    mapperState.customStagesInput = customStagesEl.value;
  }
  mapperState.selectedTemplate = template || null;
  renderMapperScreen();  // Re-render to show/hide custom stages input
}

function mapperUpdateCreateButton() {
  const createBtn = document.querySelector('.mapper-setup .btn-primary');
  if (createBtn) {
    const enabled = mapperState.selectedTaskFiles.length > 0 && mapperState.selectedTemplate;
    createBtn.disabled = !enabled;
    createBtn.style.opacity = enabled ? '' : '0.4';
  }
}

function mapperResetMapping() {
  mapperState.mappingId = null;
  mapperState.tasks = [];
  mapperState.stages = [];
  mapperState.assignments = {};
  mapperState.executedTasks = new Set();
  mapperState.selectedBatch = new Set();
  mapperState.history = [];
  mapperState.selectAllMapped = false;
  if (mapperEventSource) {
    mapperEventSource.close();
    mapperEventSource = null;
  }
}

async function mapperCreateMapping() {
  if (mapperState.selectedTaskFiles.length === 0 || !mapperState.selectedTemplate) return;

  // Read template selection fresh from DOM
  const templateEl = document.getElementById('mapper-template');
  if (templateEl) mapperState.selectedTemplate = templateEl.value;
  if (!mapperState.selectedTemplate) { alert('Select a pipeline template'); return; }

  // Get custom stages if template is "custom"
  let customStages = null;
  if (mapperState.selectedTemplate === 'custom') {
    const customStagesEl = document.getElementById('mapper-custom-stages');
    if (customStagesEl && customStagesEl.value.trim()) {
      customStages = customStagesEl.value.split(',').map(s => s.trim()).filter(Boolean);
      mapperState.customStagesInput = customStagesEl.value;  // Save for re-render
    }
  }

  try {
    const result = await api.createMapping(mapperState.selectedTaskFiles, mapperState.selectedTemplate, customStages);
    mapperState.mappingId = result.mapping_id;
    mapperState.tasks = result.tasks || [];
    mapperState.stages = result.stages || [];
    mapperState.assignments = result.auto_assignments || {};
    mapperState.executedTasks = new Set();
    mapperState.selectedBatch = new Set();
    mapperState.history = [];

    // Connect SSE for live updates
    mapperConnectSSE();

    // Load history
    mapperLoadHistory();

    renderMapperScreen();
  } catch (e) {
    alert('Create mapping failed: ' + e.message);
  }
}

function mapperRenderMappingArea() {
  const assigned = mapperState.assignments;
  const assignedTaskIds = new Set(Object.keys(assigned));

  // Left column: available tasks
  let leftCards = '';
  for (const task of mapperState.tasks) {
    const isMapped = assignedTaskIds.has(task.id);
    const isExecuted = mapperState.executedTasks.has(task.id);
    const ghostClass = isMapped ? ' mapped-ghost' : '';
    const execClass = isExecuted ? ' executed' : '';
    const draggable = isMapped ? '' : 'draggable="true"';
    const mappedBadge = isMapped ? '<span class="badge badge-pending" style="font-size:0.6rem">mapped</span>' : '';
    const unmappedBadge = (!isMapped && !isExecuted) ? '<span style="font-size:0.6rem;color:var(--text-dim)">unmapped</span>' : '';
    const execBadge = isExecuted ? '<span class="badge badge-done" style="font-size:0.6rem">&#10003; executed</span>' : '';

    leftCards += `<div class="mapper-task${ghostClass}${execClass}" ${draggable} data-task-id="${escapeHtml(task.id)}">
      <div class="mapper-task-header">
        <span class="mapper-task-name">${escapeHtml(task.name)}</span>
        ${execBadge}${mappedBadge}${unmappedBadge}
      </div>
      <div class="mapper-task-meta">
        ${modelBadge(task.model)}
        ${(task.agents || '').split(',').filter(Boolean).map(a => `<span class="tag">${escapeHtml(a.trim())}</span>`).join('')}
      </div>
    </div>`;
  }

  const unmappedCount = mapperState.tasks.length - assignedTaskIds.size;

  // Right column: pipeline stages with drop zones
  let stageCards = '';
  for (let i = 0; i < mapperState.stages.length; i++) {
    const stage = mapperState.stages[i];
    const stageName = typeof stage === 'string' ? stage : (stage.name || `Stage ${i + 1}`);

    // Collect tasks assigned to this stage
    const stageTasks = mapperState.tasks.filter(t => assigned[t.id] === i);

    let stageTaskHtml = '';
    if (stageTasks.length === 0) {
      stageTaskHtml = '<div class="mapper-drop-zone-empty">Drop tasks here</div>';
    } else {
      for (const t of stageTasks) {
        const isExecuted = mapperState.executedTasks.has(t.id);
        const isSelected = mapperState.selectedBatch.has(t.id);
        stageTaskHtml += `<div class="mapper-task${isExecuted ? ' executed' : ''}" data-task-id="${escapeHtml(t.id)}" style="cursor:default">
          <div class="mapper-task-header">
            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="mapperToggleBatchTask('${escapeHtml(t.id)}', this.checked)" style="accent-color:var(--accent)">
            <span class="mapper-task-name">${escapeHtml(t.name)}</span>
            ${isExecuted ? '<span class="badge badge-done" style="font-size:0.6rem">&#10003; executed</span>' : ''}
            ${modelBadge(t.model)}
            <button class="mapper-task-remove" onclick="mapperUnassignTask('${escapeHtml(t.id)}')" title="Unassign">&times;</button>
          </div>
        </div>`;
      }
    }

    stageCards += `<div class="mapper-stage">
      <div class="mapper-stage-header">
        <span class="stage-num">Stage ${i + 1}</span>
        <span>${escapeHtml(stageName)}</span>
        <span class="count">${stageTasks.length} task${stageTasks.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="mapper-drop-zone" data-stage-index="${i}">
        ${stageTaskHtml}
      </div>
    </div>`;
  }

  const mappedCount = assignedTaskIds.size;

  return `<div class="mapper-columns">
    <div class="mapper-col">
      <div class="mapper-col-header">Available Tasks <span class="count">${unmappedCount} unmapped / ${mapperState.tasks.length} total</span></div>
      <div id="mapper-available-tasks">${leftCards}</div>
    </div>
    <div class="mapper-col">
      <div class="mapper-col-header">Pipeline Stages <span class="count">${mappedCount} mapped</span></div>
      <div id="mapper-stages">${stageCards}</div>
    </div>
  </div>`;
}

function mapperRenderBatchBar() {
  const assigned = mapperState.assignments;
  const mappedCount = Object.keys(assigned).length;
  const selectedCount = mapperState.selectedBatch.size;

  return `<div class="mapper-batch-bar">
    <button class="btn" onclick="mapperSelectAllMapped()">${mapperState.selectAllMapped ? 'Deselect All' : 'Select All Mapped'}</button>
    <div class="mapper-batch-info"><strong>${selectedCount}</strong> of <strong>${mappedCount}</strong> tasks selected for this batch</div>
    <button class="btn" onclick="mapperClearMapping()" ${mappedCount === 0 ? 'disabled style="opacity:0.4"' : ''}>Clear Mapping</button>
    <button class="btn btn-primary" onclick="mapperExecuteBatch()" ${selectedCount === 0 ? 'disabled style="opacity:0.4"' : ''}>Execute Batch</button>
  </div>`;
}

function mapperRenderHistory() {
  if (mapperState.history.length === 0) return '';

  let items = '';
  for (const batch of mapperState.history) {
    const statusCls = batch.status === 'completed' ? 'badge-done' : batch.status === 'running' ? 'badge-running' : batch.status === 'failed' ? 'badge-failed' : 'badge-pending';
    const taskCount = (batch.task_ids || []).length;
    const timeStr = batch.started_at ? formatDate(batch.started_at) + ' ' + formatTime(batch.started_at) : '';
    items += `<div class="mapper-history-item">
      <span class="badge ${statusCls}">${batch.status || 'unknown'}</span>
      <span style="color:var(--text-muted);font-size:0.75rem">${timeStr}</span>
      <span style="flex:1">${taskCount} task${taskCount !== 1 ? 's' : ''}</span>
      ${batch.run_id ? `<a href="#/run/${escapeHtml(batch.run_id)}">View Run</a>` : ''}
      ${batch.pipeline_id ? `<a href="#/pipeline/${escapeHtml(batch.pipeline_id)}">View Pipeline</a>` : ''}
    </div>`;
  }

  return `<details class="mapper-history" ${mapperState.history.length > 0 ? 'open' : ''}>
    <summary>Batch History (${mapperState.history.length})</summary>
    <div class="mapper-history-list">${items}</div>
  </details>`;
}

// ── Drag & Drop ──
function mapperAttachDragDrop() {
  // Make available tasks draggable
  document.querySelectorAll('#mapper-available-tasks .mapper-task[draggable="true"]').forEach(el => {
    el.addEventListener('dragstart', mapperDragStart);
    el.addEventListener('dragend', mapperDragEnd);
  });

  // Make drop zones accept drops
  document.querySelectorAll('.mapper-drop-zone').forEach(zone => {
    zone.addEventListener('dragover', mapperDragOver);
    zone.addEventListener('dragleave', mapperDragLeave);
    zone.addEventListener('drop', mapperDrop);
  });
}

function mapperDragStart(e) {
  const taskId = e.currentTarget.dataset.taskId;
  e.dataTransfer.setData('text/plain', taskId);
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}

function mapperDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  // Clean up all drag-over highlights
  document.querySelectorAll('.mapper-drop-zone.drag-over').forEach(z => z.classList.remove('drag-over'));
}

function mapperDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function mapperDragLeave(e) {
  // Only remove highlight if we truly left the drop zone
  // relatedTarget may be null when dragging outside the window
  if (!e.relatedTarget || !e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

async function mapperDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');

  const taskId = e.dataTransfer.getData('text/plain');
  const stageIndex = parseInt(e.currentTarget.dataset.stageIndex, 10);

  if (!taskId || isNaN(stageIndex) || !mapperState.mappingId) return;

  // Validate the task exists and is not already assigned
  const task = mapperState.tasks.find(t => t.id === taskId);
  if (!task || mapperState.assignments.hasOwnProperty(taskId)) return;

  try {
    await api.assignTask(mapperState.mappingId, taskId, stageIndex);
    mapperState.assignments[taskId] = stageIndex;
    mapperRefreshDOM();
  } catch (err) {
    alert('Assign failed: ' + err.message);
  }
}

async function mapperUnassignTask(taskId) {
  if (!mapperState.mappingId) return;
  try {
    await api.unassignTask(mapperState.mappingId, taskId);
    delete mapperState.assignments[taskId];
    mapperState.selectedBatch.delete(taskId);
    mapperRefreshDOM();
  } catch (err) {
    alert('Unassign failed: ' + err.message);
  }
}

function mapperToggleBatchTask(taskId, checked) {
  if (checked) {
    mapperState.selectedBatch.add(taskId);
  } else {
    mapperState.selectedBatch.delete(taskId);
    mapperState.selectAllMapped = false;
  }
  // Update batch bar (count + button states) without full re-render
  const batchBar = document.querySelector('.mapper-batch-bar');
  if (batchBar) {
    const newBar = document.createElement('div');
    newBar.innerHTML = mapperRenderBatchBar();
    batchBar.replaceWith(newBar.firstElementChild);
  }
  // Sync Select All toggle state if all mapped are now selected
  const mappedCount = Object.keys(mapperState.assignments).length;
  if (mapperState.selectedBatch.size === mappedCount && mappedCount > 0) {
    mapperState.selectAllMapped = true;
  }
}

function mapperSelectAllMapped() {
  mapperState.selectAllMapped = !mapperState.selectAllMapped;
  if (mapperState.selectAllMapped) {
    Object.keys(mapperState.assignments).forEach(id => mapperState.selectedBatch.add(id));
  } else {
    mapperState.selectedBatch.clear();
  }
  mapperRefreshDOM();
}

async function mapperClearMapping() {
  if (!mapperState.mappingId) return;
  const taskIds = Object.keys(mapperState.assignments);
  if (taskIds.length === 0) return;

  for (const taskId of taskIds) {
    try {
      await api.unassignTask(mapperState.mappingId, taskId);
    } catch (_) {}
  }
  mapperState.assignments = {};
  mapperState.selectedBatch.clear();
  mapperState.selectAllMapped = false;
  mapperRefreshDOM();
}

async function mapperExecuteBatch() {
  if (!mapperState.mappingId || mapperState.selectedBatch.size === 0) return;

  const taskIds = [...mapperState.selectedBatch];
  try {
    const result = await api.executeMapping(mapperState.mappingId, taskIds);
    // Mark executed tasks
    taskIds.forEach(id => mapperState.executedTasks.add(id));
    mapperState.selectedBatch.clear();
    mapperState.selectAllMapped = false;

    // Refresh history
    await mapperLoadHistory();
    mapperRefreshDOM();

    alert(`Batch started! Run ID: ${result.run_id || 'unknown'}`);
  } catch (e) {
    alert('Execute batch failed: ' + e.message);
  }
}

async function mapperLoadHistory() {
  if (!mapperState.mappingId) return;
  try {
    const data = await api.getMappingHistory(mapperState.mappingId);
    mapperState.history = Array.isArray(data) ? data : (data.batches || []);
    // Mark executed task IDs from completed batches
    for (const batch of mapperState.history) {
      if (batch.status === 'completed') {
        (batch.task_ids || []).forEach(id => mapperState.executedTasks.add(id));
      }
    }
  } catch (_) {
    mapperState.history = [];
  }
}

function mapperRefreshDOM() {
  // Surgically update the mapping area, batch bar, and history
  const app = $('#app');
  if (!app || !mapperState.mappingId) return;

  // Update mapping columns
  const columnsEl = app.querySelector('.mapper-columns');
  if (columnsEl) {
    const newCols = document.createElement('div');
    newCols.innerHTML = mapperRenderMappingArea();
    columnsEl.replaceWith(newCols.firstElementChild);
  }

  // Update batch bar
  const batchBar = app.querySelector('.mapper-batch-bar');
  if (batchBar) {
    const newBar = document.createElement('div');
    newBar.innerHTML = mapperRenderBatchBar();
    batchBar.replaceWith(newBar.firstElementChild);
  }

  // Update history
  const historyEl = app.querySelector('.mapper-history');
  const historyHtml = mapperRenderHistory();
  if (historyEl && historyHtml) {
    const newHistory = document.createElement('div');
    newHistory.innerHTML = historyHtml;
    historyEl.replaceWith(newHistory.firstElementChild);
  } else if (!historyEl && historyHtml) {
    const batchBarNew = app.querySelector('.mapper-batch-bar');
    if (batchBarNew) {
      batchBarNew.insertAdjacentHTML('afterend', historyHtml);
    }
  }

  // Re-attach drag-and-drop listeners
  mapperAttachDragDrop();
}

// ── Mapper SSE ──
function mapperConnectSSE() {
  if (typeof EventSource === 'undefined' || !mapperState.mappingId) return;
  if (mapperEventSource) { mapperEventSource.close(); mapperEventSource = null; }

  try {
    mapperEventSource = new EventSource(`${API_BASE}/api/events`);

    mapperEventSource.addEventListener('batch_started', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.mapping_id !== mapperState.mappingId) return;
        mapperLoadHistory().then(() => mapperRefreshDOM());
      } catch (_) {}
    });

    mapperEventSource.addEventListener('batch_completed', function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.mapping_id !== mapperState.mappingId) return;
        // Mark tasks as executed
        (data.task_ids || []).forEach(id => mapperState.executedTasks.add(id));
        mapperLoadHistory().then(() => mapperRefreshDOM());
      } catch (_) {}
    });

    // Also listen for generic messages
    mapperEventSource.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        if (data.mapping_id !== mapperState.mappingId) return;
        if (data.type === 'batch_started' || data.type === 'batch_completed') {
          if (data.type === 'batch_completed') {
            (data.task_ids || []).forEach(id => mapperState.executedTasks.add(id));
          }
          mapperLoadHistory().then(() => mapperRefreshDOM());
        }
      } catch (_) {}
    };

    mapperEventSource.onerror = function() {
      if (mapperEventSource) { mapperEventSource.close(); mapperEventSource = null; }
    };
  } catch (_) {}
}

async function wsGenerateAndMap() {
  const promptEl = $('#ws-brainstorm-prompt');
  const modelEl = $('#ws-brainstorm-model');
  const modeEl = $('#ws-brainstorm-mode');
  const templateEl = $('#ws-bs-map-template');
  const stagesEl = $('#ws-bs-stages');  // Custom stages input (for pipeline-custom mode)
  if (!promptEl?.value.trim()) { alert('Enter a prompt describing what you want to build'); return; }
  if (!wsState.selectedRepo) { alert('Select a repository first'); return; }
  // Check mode - if pipeline-custom, use "custom" template and get stages
  const mode = modeEl?.value || 'orchestra';
  const pipelineTemplate = mode === 'pipeline-custom' ? 'custom' : (templateEl?.value || 'feature');
  
  // Get custom stages if in pipeline-custom mode
  let customStages = null;
  if (mode === 'pipeline-custom' && stagesEl?.value.trim()) {
    customStages = stagesEl.value.split(',').map(s => s.trim()).filter(Boolean);
  }
  
  const panel = promptEl.closest('.ws-brainstorm');
  panel.classList.add('loading');
  wsSetProgress('Generating tasks and creating mapping...');
  try {
    const result = await api.brainstormToMapping(
      wsState.selectedRepo,
      promptEl.value.trim(),
      pipelineTemplate,
      modelEl?.value || 'sonnet',
      customStages
    );
    wsSetProgress('');
    // Populate mapper state with the returned data
    mapperState.mappingId = result.mapping_id;
    mapperState.tasks = result.tasks || [];
    mapperState.stages = result.stages || [];
    mapperState.assignments = result.auto_assignments || {};
    mapperState.executedTasks = new Set();
    mapperState.selectedBatch = new Set();
    mapperState.history = [];
    mapperState.selectAllMapped = false;
    // Track the generated tasks file
    if (result.tasks_file) {
      mapperState.loadedTaskFiles = [result.tasks_file];
    }
    // Navigate to the Pipeline Mapper tab
    location.hash = '#/mapper';
  } catch (e) {
    wsSetProgress('');
    alert('Generate & Map failed: ' + e.message);
  } finally {
    panel.classList.remove('loading');
  }
}

// ── Init ──
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);
</script>
