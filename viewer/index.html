<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-orchestra viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --surface3: #262626;
  --border: #2a2a2a;
  --border-light: #333;
  --accent: #a855f7;
  --accent2: #7c3aed;
  --text: #e5e5e5;
  --text-muted: #737373;
  --text-dim: #525252;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --blue: #3b82f6;
  --orange: #f97316;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.6; min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.brand { font-family: var(--mono); font-weight: 700; font-size: 1rem; color: var(--accent); white-space: nowrap; }
.brand::before { content: '▸ '; color: var(--text-muted); }
#breadcrumb { font-family: var(--mono); font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 4px; align-items: center; overflow: hidden; }
#breadcrumb a { color: var(--text-muted); }
#breadcrumb a:hover { color: var(--accent); }
#breadcrumb .sep { color: var(--text-dim); margin: 0 2px; }
#breadcrumb .current { color: var(--text); }

/* Main */
main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Loading */
.loading { text-align: center; color: var(--text-muted); padding: 60px; font-family: var(--mono); }
.loading::before { content: '⠋ '; animation: spin 0.8s steps(10) infinite; }
@keyframes spin { to { content: '⠿ '; } }

/* Error */
.error-banner { background: #7f1d1d; border: 1px solid var(--red); color: #fca5a5; padding: 12px 16px; border-radius: var(--radius); margin: 16px 0; font-family: var(--mono); font-size: 0.85rem; }

/* Session List */
.search-box { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.85rem; margin-bottom: 16px; outline: none; }
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-dim); }

.runs-table { width: 100%; border-collapse: collapse; }
.runs-table th { text-align: left; padding: 8px 12px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); font-weight: 500; }
.runs-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.85rem; }
.runs-table tr { cursor: pointer; transition: background 0.15s; }
.runs-table tr:hover { background: var(--surface2); }
.run-date { color: var(--text); white-space: nowrap; }
.run-time { color: var(--text-muted); font-size: 0.8rem; }

/* Status bar */
.status-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; min-width: 120px; background: var(--surface3); }
.status-bar .seg-done { background: var(--green); }
.status-bar .seg-running { background: var(--yellow); }
.status-bar .seg-pending { background: var(--text-dim); }
.status-bar .seg-failed { background: var(--red); }

.status-counts { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
.ecc-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
.ecc-on { background: #14532d; color: #86efac; }
.ecc-off { background: var(--surface3); color: var(--text-dim); }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: 700; font-family: var(--mono); letter-spacing: 0.02em; }
.badge-done { background: #14532d; color: #86efac; border: 1px solid #22c55e40; }
.badge-running { background: #422006; color: #fcd34d; border: 1px solid #eab30840; animation: pulse 2s infinite; }
.badge-pending { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); }
.badge-failed { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef444440; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

.badge-opus { background: #3b0764; color: #c084fc; border: 1px solid #7c3aed40; }
.badge-sonnet { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f640; }
.badge-haiku { background: #14532d; color: #86efac; border: 1px solid #22c55e40; }

.badge-critical { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; font-weight: 800; }
.badge-high { background: #78350f; color: #fcd34d; border: 1px solid #f59e0b; }
.badge-medium { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
.badge-low { background: #14532d; color: #86efac; border: 1px solid #22c55e; }

.tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); margin: 1px; }

/* Task cards grid */
.task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; margin-top: 16px; }
.task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: border-color 0.15s; }
.task-card:hover { border-color: var(--accent); }
.task-card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.task-card-name { font-weight: 600; font-size: 0.9rem; flex: 1; }
.task-card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.task-card-size { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); }
.task-card-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.75rem; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.15s; text-decoration: none; }
.btn:hover { background: var(--surface3); border-color: var(--accent); color: var(--accent); text-decoration: none; }
.btn-primary { background: var(--accent2); border-color: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent); color: white; }

/* Run header */
.run-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.run-header h2 { font-family: var(--mono); font-size: 1.1rem; margin-bottom: 8px; }
.run-header-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; color: var(--text-muted); }

/* Output view */
.output-toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.output-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.output-container h1, .output-container h2, .output-container h3, .output-container h4 { color: var(--text); margin-top: 1.5em; margin-bottom: 0.5em; font-family: var(--sans); }
.output-container h1 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.output-container h2 { font-size: 1.15rem; }
.output-container h3 { font-size: 1rem; color: var(--text-muted); }
.output-container p { margin: 0.5em 0; }
.output-container ul, .output-container ol { margin: 0.5em 0; padding-left: 1.5em; }
.output-container li { margin: 0.3em 0; }
.output-container code { font-family: var(--mono); font-size: 0.85em; background: var(--surface2); padding: 1px 5px; border-radius: 3px; }
.output-container pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; overflow-x: auto; margin: 1em 0; position: relative; }
.output-container pre code { background: transparent; padding: 0; font-size: 0.8rem; line-height: 1.5; }
.output-container table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.85rem; }
.output-container th, .output-container td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.output-container th { background: var(--surface2); font-weight: 600; color: var(--text-muted); }
.output-container blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-muted); margin: 1em 0; }
.output-container hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
.output-container strong { color: var(--text); }
.output-container a { color: var(--accent); }

/* Copy button on code blocks */
.copy-btn { position: absolute; top: 6px; right: 6px; padding: 3px 8px; font-size: 0.65rem; background: var(--surface3); border: 1px solid var(--border); color: var(--text-muted); border-radius: 3px; cursor: pointer; font-family: var(--mono); opacity: 0; transition: opacity 0.15s; }
pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--accent2); color: white; border-color: var(--accent); }
.copy-btn.copied { background: var(--green); color: white; border-color: var(--green); }

/* Collapsible sections */
.collapsible { border: 1px solid var(--border); border-radius: var(--radius); margin: 12px 0; overflow: hidden; }
.collapsible > summary { cursor: pointer; padding: 10px 14px; background: var(--surface2); font-weight: 600; font-size: 0.95rem; list-style: none; display: flex; align-items: center; gap: 8px; }
.collapsible > summary::before { content: '▸'; color: var(--text-muted); font-family: var(--mono); font-size: 0.8rem; transition: transform 0.15s; }
.collapsible[open] > summary::before { transform: rotate(90deg); }
.collapsible > summary:hover { background: var(--surface3); }
.collapsible > .section-content { padding: 16px; }

/* Timeline */
.timeline { position: relative; padding-left: 32px; }
.timeline::before { content: ''; position: absolute; left: 11px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tl-event { position: relative; margin-bottom: 12px; }
.tl-dot { position: absolute; left: -27px; top: 8px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); }
.tl-event.tl-init .tl-dot { background: var(--accent); border-color: var(--accent); }
.tl-event.tl-tool .tl-dot { background: var(--blue); border-color: var(--blue); }
.tl-event.tl-thinking .tl-dot { background: var(--yellow); border-color: var(--yellow); }
.tl-event.tl-text .tl-dot { background: var(--green); border-color: var(--green); }
.tl-event.tl-progress .tl-dot { width: 6px; height: 6px; left: -24px; top: 10px; background: var(--text-dim); border: none; }
.tl-event.tl-notification .tl-dot { background: var(--orange); border-color: var(--orange); }

.tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.tl-card-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 0.8rem; cursor: pointer; }
.tl-card-header:hover { background: var(--surface2); }
.tl-card-body { padding: 12px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 0.75rem; max-height: 300px; overflow: auto; white-space: pre-wrap; word-break: break-word; color: var(--text-muted); background: var(--surface2); }
.tl-tool-icon { font-size: 0.9rem; }
.tl-tool-name { font-weight: 600; color: var(--blue); }
.tl-tool-summary { color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-compact { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); padding: 2px 0; }
.tl-meta { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 16px; display: flex; gap: 20px; flex-wrap: wrap; font-family: var(--mono); font-size: 0.8rem; }
.tl-meta-item { display: flex; flex-direction: column; }
.tl-meta-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
.tl-meta-value { color: var(--text); font-weight: 600; }

/* Responsive */
@media (max-width: 768px) {
  main { padding: 12px; }
  .task-grid { grid-template-columns: 1fr; }
  header { padding: 10px 16px; }
}
</style>
</head>
<body>
<header>
  <div class="brand">claude-orchestra</div>
  <nav id="breadcrumb"></nav>
</header>
<main id="app">
  <div class="loading">Loading runs...</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/rust.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/toml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/typescript.min.js"></script>
<script>
// Register languages
if (window.hljs) {
  ['rust','sql','bash','python','json','yaml','toml','css','xml','javascript','typescript'].forEach(l => {
    try { /* already registered via script tags */ } catch(e) {}
  });
}

// ── API Client ──
const API_BASE = location.origin;
const api = {
  async getRuns() {
    const r = await fetch(`${API_BASE}/api/runs`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getRun(id) {
    const r = await fetch(`${API_BASE}/api/runs/${id}`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getOutput(runId, taskId) {
    const r = await fetch(`${API_BASE}/api/runs/${runId}/${taskId}/output`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.text();
  },
  async getStream(runId, taskId) {
    const r = await fetch(`${API_BASE}/api/runs/${runId}/${taskId}/stream?summarize=1`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  }
};

// ── Cache ──
const cache = { runs: null, details: {}, outputs: {}, streams: {} };

// ── Helpers ──
function $(sel, parent) { return (parent || document).querySelector(sel); }
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'onclick') el.onclick = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}

function formatBytes(n) {
  if (!n) return '0B';
  if (n < 1024) return n + 'B';
  if (n < 1048576) return (n/1024).toFixed(1) + 'K';
  return (n/1048576).toFixed(1) + 'M';
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

function formatDuration(ms) {
  if (!ms) return '—';
  if (ms < 1000) return ms + 'ms';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return `${m}m${s % 60}s`;
}

function statusBadge(status) {
  const cls = { done: 'badge-done', running: 'badge-running', pending: 'badge-pending', failed: 'badge-failed' };
  return `<span class="badge ${cls[status] || 'badge-pending'}">${status || 'unknown'}</span>`;
}

function modelBadge(model) {
  if (!model) return '';
  const m = model.toLowerCase();
  let cls = 'badge-sonnet';
  if (m.includes('opus')) cls = 'badge-opus';
  else if (m.includes('haiku')) cls = 'badge-haiku';
  return `<span class="badge ${cls}">${model}</span>`;
}

function severityReplace(html) {
  return html
    .replace(/\bCRITICAL\b/g, '<span class="badge badge-critical">CRITICAL</span>')
    .replace(/\b(HIGH)\b(?![^<]*>)/g, '<span class="badge badge-high">HIGH</span>')
    .replace(/\bMEDIUM\b/g, '<span class="badge badge-medium">MEDIUM</span>')
    .replace(/\bLOW\b/g, '<span class="badge badge-low">LOW</span>');
}

// ── Breadcrumb ──
function setBreadcrumb(...parts) {
  const bc = $('#breadcrumb');
  bc.innerHTML = '';
  parts.forEach((p, i) => {
    if (i > 0) bc.appendChild(h('span', { className: 'sep' }, '/'));
    if (p.href) {
      bc.appendChild(h('a', { href: p.href }, p.text));
    } else {
      bc.appendChild(h('span', { className: 'current' }, p.text));
    }
  });
}

// ── Markdown Rendering ──
function renderMarkdown(md) {
  if (!window.marked) return `<pre>${md}</pre>`;
  let html = marked.parse(md, { breaks: false, gfm: true });
  html = severityReplace(html);
  return html;
}

function highlightCodeBlocks(container) {
  if (!window.hljs) return;
  container.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function addCopyButtons(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const btn = h('button', { className: 'copy-btn', onclick: () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    }}, 'Copy');
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
}

function makeCollapsible(container) {
  container.querySelectorAll('h2, h3').forEach(heading => {
    const details = document.createElement('details');
    details.className = 'collapsible';
    details.open = true;
    const summary = document.createElement('summary');
    summary.innerHTML = heading.innerHTML;
    details.appendChild(summary);
    const content = document.createElement('div');
    content.className = 'section-content';
    let sibling = heading.nextElementSibling;
    const level = heading.tagName;
    heading.parentNode.insertBefore(details, heading);
    heading.remove();
    while (sibling && !(sibling.tagName === level || (level === 'H2' && sibling.tagName === 'H2') || (level === 'H3' && (sibling.tagName === 'H2' || sibling.tagName === 'H3')))) {
      const next = sibling.nextElementSibling;
      content.appendChild(sibling);
      sibling = next;
    }
    details.appendChild(content);
  });
}

// ── Router ──
function route() {
  const hash = location.hash || '#/';
  const app = $('#app');

  let m;
  if (hash === '#/' || hash === '#') {
    renderSessionList();
  } else if (m = hash.match(/^#\/run\/([^/]+)$/)) {
    renderRunDetail(m[1]);
  } else if (m = hash.match(/^#\/run\/([^/]+)\/([^/]+)\/output$/)) {
    renderTaskOutput(m[1], m[2]);
  } else if (m = hash.match(/^#\/run\/([^/]+)\/([^/]+)\/timeline$/)) {
    renderTaskTimeline(m[1], m[2]);
  } else {
    app.innerHTML = '<div class="error-banner">Route not found</div>';
  }
}

// ── Views ──
async function renderSessionList() {
  const app = $('#app');
  setBreadcrumb({ text: 'Runs' });
  app.innerHTML = '<div class="loading">Loading runs...</div>';

  try {
    if (!cache.runs) cache.runs = await api.getRuns();
    const { runs } = cache.runs;

    let html = `<input type="text" class="search-box" placeholder="Search runs by task name..." id="search">`;
    html += `<table class="runs-table"><thead><tr>
      <th>Run</th><th>Status</th><th>Tasks</th><th>ECC</th><th>Output</th>
    </tr></thead><tbody id="runs-body">`;

    for (const run of runs) {
      const c = run.task_counts;
      const total = c.total || 1;
      html += `<tr onclick="location.hash='#/run/${run.id}'" data-id="${run.id}">
        <td><span class="run-date">${formatDate(run.started_at_iso)}</span> <span class="run-time">${formatTime(run.started_at_iso)}</span></td>
        <td>
          <div class="status-bar">
            ${c.done ? `<div class="seg-done" style="width:${c.done/total*100}%"></div>` : ''}
            ${c.running ? `<div class="seg-running" style="width:${c.running/total*100}%"></div>` : ''}
            ${c.pending ? `<div class="seg-pending" style="width:${c.pending/total*100}%"></div>` : ''}
            ${c.failed ? `<div class="seg-failed" style="width:${c.failed/total*100}%"></div>` : ''}
          </div>
          <div class="status-counts">${c.done} done${c.running ? `, ${c.running} running` : ''}${c.failed ? `, ${c.failed} failed` : ''}</div>
        </td>
        <td>${c.total}</td>
        <td><span class="ecc-badge ${run.ecc_enabled ? 'ecc-on' : 'ecc-off'}">${run.ecc_enabled ? 'ECC' : 'standalone'}</span></td>
        <td>${formatBytes(run.total_output_bytes)}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    app.innerHTML = html;

    // Search filter
    const search = $('#search');
    search.addEventListener('input', () => {
      const q = search.value.toLowerCase();
      document.querySelectorAll('#runs-body tr').forEach(tr => {
        tr.style.display = tr.dataset.id.includes(q) ? '' : 'none';
      });
    });
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

async function renderRunDetail(runId) {
  const app = $('#app');
  setBreadcrumb({ text: 'Runs', href: '#/' }, { text: runId });
  app.innerHTML = '<div class="loading">Loading run...</div>';

  try {
    if (!cache.details[runId]) cache.details[runId] = await api.getRun(runId);
    const run = cache.details[runId];

    let html = `<div class="run-header">
      <h2>${runId}</h2>
      <div class="run-header-meta">
        <span>${formatDate(run.started_at_iso)} ${formatTime(run.started_at_iso)}</span>
        <span class="ecc-badge ${run.ecc_enabled ? 'ecc-on' : 'ecc-off'}">${run.ecc_enabled ? 'ECC enabled' : 'standalone'}</span>
        <span>${run.tasks.length} tasks</span>
      </div>
    </div>`;

    html += '<div class="task-grid">';
    for (const t of run.tasks) {
      const agents = t.agents ? t.agents.split(',').map(a => `<span class="tag">${a.trim()}</span>`).join('') : '';
      const skills = t.skills ? t.skills.split(',').map(s => `<span class="tag">${s.trim()}</span>`).join('') : '';
      html += `<div class="task-card">
        <div class="task-card-header">
          ${statusBadge(t.status)}
          <span class="task-card-name">${t.name}</span>
        </div>
        <div class="task-card-meta">
          ${modelBadge(t.model)}
          ${agents}
          ${skills}
        </div>
        <div class="task-card-size">output: ${formatBytes(t.output_bytes)} · stream: ${formatBytes(t.stream_bytes)}</div>
        <div class="task-card-actions">
          ${t.has_output ? `<a class="btn btn-primary" href="#/run/${runId}/${t.id}/output">View Output</a>` : '<span class="btn" style="opacity:0.3">No Output</span>'}
          ${t.has_stream ? `<a class="btn" href="#/run/${runId}/${t.id}/timeline">Timeline</a>` : ''}
        </div>
      </div>`;
    }
    html += '</div>';
    app.innerHTML = html;
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

async function renderTaskOutput(runId, taskId) {
  const app = $('#app');
  const displayName = taskId.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  setBreadcrumb({ text: 'Runs', href: '#/' }, { text: runId, href: `#/run/${runId}` }, { text: displayName });
  app.innerHTML = '<div class="loading">Loading output...</div>';

  try {
    const key = `${runId}/${taskId}`;
    if (!cache.outputs[key]) cache.outputs[key] = await api.getOutput(runId, taskId);
    const md = cache.outputs[key];

    const toolbar = `<div class="output-toolbar">
      <a class="btn" href="#/run/${runId}/${taskId}/timeline">View Timeline</a>
      <button class="btn" id="toggle-collapse">Collapse All</button>
      <a class="btn" href="#/run/${runId}">← Back to Run</a>
    </div>`;

    app.innerHTML = toolbar + '<div class="output-container" id="output-content"></div>';
    const container = $('#output-content');
    container.innerHTML = renderMarkdown(md);
    highlightCodeBlocks(container);
    addCopyButtons(container);
    makeCollapsible(container);

    // Toggle collapse
    let collapsed = false;
    $('#toggle-collapse').onclick = () => {
      collapsed = !collapsed;
      container.querySelectorAll('details.collapsible').forEach(d => d.open = !collapsed);
      $('#toggle-collapse').textContent = collapsed ? 'Expand All' : 'Collapse All';
    };
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

async function renderTaskTimeline(runId, taskId) {
  const app = $('#app');
  const displayName = taskId.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  setBreadcrumb({ text: 'Runs', href: '#/' }, { text: runId, href: `#/run/${runId}` }, { text: displayName + ' Timeline' });
  app.innerHTML = '<div class="loading">Parsing timeline...</div>';

  try {
    const key = `${runId}/${taskId}`;
    if (!cache.streams[key]) cache.streams[key] = await api.getStream(runId, taskId);
    const data = cache.streams[key];

    let html = `<div class="output-toolbar">
      <a class="btn" href="#/run/${runId}/${taskId}/output">View Output</a>
      <a class="btn" href="#/run/${runId}">← Back to Run</a>
    </div>`;

    // Meta bar
    const m = data.meta || {};
    html += `<div class="tl-meta">
      <div class="tl-meta-item"><span class="tl-meta-label">Duration</span><span class="tl-meta-value">${formatDuration(m.duration_ms)}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Cost</span><span class="tl-meta-value">${m.total_cost_usd ? '$' + m.total_cost_usd.toFixed(2) : '—'}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Turns</span><span class="tl-meta-value">${m.num_turns || '—'}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Tokens</span><span class="tl-meta-value">${(m.input_tokens||0) + (m.output_tokens||0) || '—'}</span></div>
      <div class="tl-meta-item"><span class="tl-meta-label">Events</span><span class="tl-meta-value">${data.events.length}</span></div>
    </div>`;

    html += '<div class="timeline" id="timeline"></div>';
    app.innerHTML = html;

    // Incremental rendering
    const container = $('#timeline');
    const events = data.events;
    let i = 0;
    function renderBatch() {
      const end = Math.min(i + 15, events.length);
      for (; i < end; i++) {
        container.appendChild(renderTimelineEvent(events[i]));
      }
      if (i < events.length) requestAnimationFrame(renderBatch);
    }
    requestAnimationFrame(renderBatch);
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

// ── Timeline Event Renderers ──
const TOOL_ICONS = { Read: '📄', Write: '✏️', Edit: '✏️', Glob: '🔍', Grep: '🔍', Bash: '⚡', Agent: '🤖', Task: '🤖', WebFetch: '🌐', TodoWrite: '📋' };

function renderTimelineEvent(ev) {
  const div = document.createElement('div');
  div.className = 'tl-event';

  switch (ev.type) {
    case 'init':
      div.classList.add('tl-init');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header"><span class="tl-tool-icon">🚀</span> <span class="tl-tool-name">Session Init</span>
        <span class="tl-tool-summary">model: ${ev.model || '?'} · tools: ${ev.tool_count || '?'} · cwd: ${(ev.cwd||'').split('/').pop()}</span></div></div>`;
      break;

    case 'thinking':
      div.classList.add('tl-thinking');
      const thinkPreview = (ev.text || '').substring(0, 80) + ((ev.text||'').length > 80 ? '...' : '');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <span class="tl-tool-icon">🧠</span> <span class="tl-tool-name" style="color:var(--yellow)">Thinking</span>
          <span class="tl-tool-summary">${escapeHtml(thinkPreview)}</span>
        </div>
        <div class="tl-card-body" style="display:none">${escapeHtml(ev.text || '')}</div>
      </div>`;
      break;

    case 'tool_use':
      div.classList.add('tl-tool');
      const icon = TOOL_ICONS[ev.name] || '🔧';
      const inputStr = ev.input ? JSON.stringify(ev.input, null, 2) : '';
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header" onclick="this.parentElement.querySelector('.tl-card-body').style.display = this.parentElement.querySelector('.tl-card-body').style.display === 'none' ? 'block' : 'none'">
          <span class="tl-tool-icon">${icon}</span>
          <span class="tl-tool-name">${ev.name}</span>
          <span class="tl-tool-summary">${escapeHtml(ev.summary || '')}</span>
        </div>
        <div class="tl-card-body" style="display:none"><strong style="color:var(--text)">Input:</strong>\n${escapeHtml(inputStr)}\n\n<strong style="color:var(--text)">Result:</strong>\n${escapeHtml(ev.result || '(empty)')}${ev.result_truncated ? '\n... (truncated)' : ''}</div>
      </div>`;
      break;

    case 'text':
      div.classList.add('tl-text');
      const textPreview = (ev.text || '').substring(0, 100) + ((ev.text||'').length > 100 ? '...' : '');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card">
        <div class="tl-card-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <span class="tl-tool-icon">💬</span> <span class="tl-tool-name" style="color:var(--green)">Response</span>
          <span class="tl-tool-summary">${escapeHtml(textPreview)}</span>
        </div>
        <div class="tl-card-body" style="display:none">${escapeHtml(ev.text || '')}</div>
      </div>`;
      break;

    case 'progress':
      div.classList.add('tl-progress');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-compact">${ev.tool_name ? `<span class="tag">${ev.tool_name}</span> ` : ''}${escapeHtml(ev.description || '')}</div>`;
      break;

    case 'task_started':
      div.classList.add('tl-notification');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card"><div class="tl-card-header">
        <span class="tl-tool-icon">📌</span> <span class="tl-tool-name" style="color:var(--orange)">Task Started</span>
        <span class="tl-tool-summary">${escapeHtml(ev.description || '')}</span>
      </div></div>`;
      break;

    case 'task_notification':
      div.classList.add('tl-notification');
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-card"><div class="tl-card-header">
        <span class="tl-tool-icon">✅</span> <span class="tl-tool-name" style="color:var(--orange)">Task Complete</span>
        <span class="tl-tool-summary">${escapeHtml(ev.summary || ev.status || '')}</span>
      </div></div>`;
      break;

    case 'rate_limit':
      div.classList.add('tl-notification');
      div.innerHTML = `<div class="tl-dot" style="background:var(--red);border-color:var(--red)"></div><div class="tl-card" style="border-color:#ef444440"><div class="tl-card-header">
        <span class="tl-tool-icon">⚠️</span> <span class="tl-tool-name" style="color:var(--red)">Rate Limited</span>
      </div></div>`;
      break;

    default:
      div.innerHTML = `<div class="tl-dot"></div><div class="tl-compact" style="color:var(--text-dim)">${ev.type}: ${JSON.stringify(ev).substring(0, 80)}</div>`;
  }
  return div;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.addEventListener('DOMContentLoaded', route);
