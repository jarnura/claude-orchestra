<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-orchestra</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070a;
  --surface: #0e0e14;
  --surface2: #14141e;
  --surface3: #1a1a28;
  --border: #1f1f33;
  --border-light: #2a2a44;
  --accent: #c4a1ff;
  --accent2: #8b5cf6;
  --accent-glow: #a78bfa;
  --accent-dim: #6d28d9;
  --cyan: #22d3ee;
  --cyan-dim: #0e7490;
  --text: #e8e6f0;
  --text-muted: #7c7a8e;
  --text-dim: #4a4860;
  --green: #34d399;
  --green-dim: #065f46;
  --yellow: #fbbf24;
  --yellow-dim: #78350f;
  --red: #f87171;
  --red-dim: #7f1d1d;
  --blue: #60a5fa;
  --orange: #fb923c;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --display: 'Space Grotesk', var(--sans);
  --radius: 8px;
  --radius-lg: 16px;
  --glow-sm: 0 0 8px rgba(196, 161, 255, 0.15);
  --glow-md: 0 0 20px rgba(196, 161, 255, 0.12), 0 0 40px rgba(139, 92, 246, 0.06);
  --glow-lg: 0 0 30px rgba(196, 161, 255, 0.2), 0 0 60px rgba(139, 92, 246, 0.1);
  --glow-cyan: 0 0 20px rgba(34, 211, 238, 0.15);
  /* Stagger timing */
  --stagger-base: 60ms;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  min-height: 100vh;
  /* Subtle scanline overlay */
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 4px),
    radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.07) 0%, transparent 60%);
  background-attachment: fixed;
}
a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--cyan); text-decoration: none; }

/* ── Stagger Animation System ── */
@keyframes stagger-in {
  from { opacity: 0; transform: translateY(16px) skewX(-0.5deg); filter: blur(3px); }
  to { opacity: 1; transform: translateY(0) skewX(0deg); filter: blur(0); }
}
@keyframes stagger-in-left {
  from { opacity: 0; transform: translateX(-24px) skewY(-0.5deg); }
  to { opacity: 1; transform: translateX(0) skewY(0deg); }
}
@keyframes glow-pulse {
  0%, 100% { box-shadow: var(--glow-sm); }
  50% { box-shadow: var(--glow-md); }
}
@keyframes scanline-sweep {
  0% { background-position: 0 -100%; }
  100% { background-position: 0 200%; }
}
@keyframes flicker-in {
  0% { opacity: 0; }
  10% { opacity: 0.8; }
  12% { opacity: 0.2; }
  20% { opacity: 1; }
  22% { opacity: 0.7; }
  30% { opacity: 1; }
}
@keyframes text-glitch {
  0%, 100% { text-shadow: none; }
  20% { text-shadow: -2px 0 var(--cyan), 2px 0 var(--accent); }
  40% { text-shadow: 2px 0 var(--red), -2px 0 var(--blue); }
  60% { text-shadow: -1px 0 var(--accent), 1px 0 var(--cyan); }
}
.stagger-item {
  opacity: 0;
  animation: stagger-in 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
/* Generate stagger delays */
.stagger-item:nth-child(1) { animation-delay: calc(var(--stagger-base) * 1); }
.stagger-item:nth-child(2) { animation-delay: calc(var(--stagger-base) * 2); }
.stagger-item:nth-child(3) { animation-delay: calc(var(--stagger-base) * 3); }
.stagger-item:nth-child(4) { animation-delay: calc(var(--stagger-base) * 4); }
.stagger-item:nth-child(5) { animation-delay: calc(var(--stagger-base) * 5); }
.stagger-item:nth-child(6) { animation-delay: calc(var(--stagger-base) * 6); }
.stagger-item:nth-child(7) { animation-delay: calc(var(--stagger-base) * 7); }
.stagger-item:nth-child(8) { animation-delay: calc(var(--stagger-base) * 8); }
.stagger-item:nth-child(9) { animation-delay: calc(var(--stagger-base) * 9); }
.stagger-item:nth-child(10) { animation-delay: calc(var(--stagger-base) * 10); }
.stagger-item:nth-child(n+11) { animation-delay: calc(var(--stagger-base) * 11); }

/* ── Header — The Bold Typographic Moment ── */
header {
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  min-height: 56px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--accent-dim) 30%, var(--accent) 50%, var(--accent-dim) 70%, transparent 100%);
  opacity: 0.5;
}
.brand {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: -0.02em;
  color: var(--accent);
  white-space: nowrap;
  position: relative;
  animation: flicker-in 0.8s ease-out;
}
.brand::before {
  content: '//';
  color: var(--text-dim);
  margin-right: 6px;
  font-weight: 400;
}
.brand:hover {
  animation: text-glitch 0.3s ease-in-out;
}
.header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.github-link {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  color: var(--text-muted);
  transition: all 0.15s;
}
.github-link:hover {
  color: var(--text);
  background: var(--surface2);
}
.github-link svg {
  width: 20px;
  height: 20px;
}
#breadcrumb { font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 4px; align-items: center; overflow: hidden; }
#breadcrumb a { color: var(--text-muted); }
#breadcrumb a:hover { color: var(--cyan); }
#breadcrumb .sep { color: var(--text-dim); margin: 0 4px; opacity: 0.4; }
#breadcrumb .current { color: var(--text); font-weight: 500; }

/* ── Tab bar — Diagonal accent ── */
.tab-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0;
  padding: 0 32px;
  position: sticky;
  top: 56px;
  z-index: 99;
}
.tab-bar a {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 20px;
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-dim);
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s, transform 0.15s;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  position: relative;
}
.tab-bar a:hover {
  color: var(--text);
  text-decoration: none;
  transform: translateY(-1px);
}
.tab-bar a.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  text-shadow: 0 0 12px rgba(196, 161, 255, 0.3);
}
/* Active tab glow underline */
.tab-bar a.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 20%;
  right: 20%;
  height: 2px;
  background: var(--accent);
  filter: blur(4px);
}

/* ── Main ── */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px;
}

/* ── Loading — Retro spinner ── */
.loading {
  text-align: center;
  color: var(--text-muted);
  padding: 80px;
  font-family: var(--mono);
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  animation: flicker-in 0.8s ease-out;
}
.loading::before {
  content: '[ ';
  color: var(--accent-dim);
}
.loading::after {
  content: ' ]';
  color: var(--accent-dim);
}

/* ── Error ── */
.error-banner {
  background: linear-gradient(135deg, var(--red-dim) 0%, #450a0a 100%);
  border: 1px solid rgba(248, 113, 113, 0.3);
  color: #fca5a5;
  padding: 14px 18px;
  border-radius: var(--radius);
  margin: 16px 0;
  font-family: var(--mono);
  font-size: 0.85rem;
  box-shadow: 0 0 20px rgba(248, 113, 113, 0.08);
}

/* ── Search ── */
.search-box {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 0.85rem;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-box:focus { border-color: var(--accent); box-shadow: var(--glow-sm); }
.search-box::placeholder { color: var(--text-dim); }


/* ── Runs Table ── */
.runs-table { width: 100%; border-collapse: collapse; }
.runs-table th { text-align: left; padding: 10px 14px; color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); font-weight: 500; }
.runs-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.85rem; }
.runs-table tr { cursor: pointer; transition: background 0.2s, transform 0.15s; }
.runs-table tr:hover { background: linear-gradient(90deg, var(--surface2) 0%, var(--surface) 100%); }
.run-date { color: var(--text); white-space: nowrap; }
.run-time { color: var(--text-muted); font-size: 0.8rem; }

/* ── Status bar — Glowing segments ── */
.status-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; min-width: 120px; background: var(--surface3); }
.status-bar .seg-done { background: var(--green); box-shadow: 0 0 6px rgba(52, 211, 153, 0.4); }
.status-bar .seg-running { background: var(--yellow); box-shadow: 0 0 6px rgba(251, 191, 36, 0.4); }
.status-bar .seg-pending { background: var(--text-dim); }
.status-bar .seg-failed { background: var(--red); box-shadow: 0 0 6px rgba(248, 113, 113, 0.4); }
.status-bar .seg-retrying { background: var(--yellow); box-shadow: 0 0 6px rgba(251, 191, 36, 0.4); }
.status-bar .seg-verifying { background: var(--cyan); box-shadow: 0 0 6px rgba(34, 211, 238, 0.4); }

.status-counts { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
.ecc-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 600; font-family: var(--mono); letter-spacing: 0.04em; }
.ecc-on { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.2); }
.ecc-off { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); }

/* ── Badges — Retro-futuristic ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 0.65rem;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge-done { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.25); }
.badge-running { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(251, 191, 36, 0.25); animation: pulse 2s infinite; }
.badge-pending { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); }
.badge-failed { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.25); }
.badge-retrying { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(251, 191, 36, 0.25); animation: pulse 2s infinite; }
.badge-verifying { background: rgba(14, 116, 144, 0.3); color: var(--cyan); border: 1px solid rgba(34, 211, 238, 0.25); animation: pulse 2s infinite; }
.badge-verify-passed { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.25); font-size: 0.6rem; }
.badge-verify-failed { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.25); font-size: 0.6rem; }
.badge-verify-skipped { background: var(--surface3); color: var(--text-dim); border: 1px solid var(--border); font-size: 0.6rem; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.badge-opus { background: rgba(59, 7, 100, 0.5); color: #c084fc; border: 1px solid rgba(139, 92, 246, 0.25); }
.badge-sonnet { background: rgba(30, 58, 95, 0.5); color: var(--blue); border: 1px solid rgba(96, 165, 250, 0.25); }
.badge-haiku { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52, 211, 153, 0.25); }

.badge-critical { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); font-weight: 800; text-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }
.badge-high { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--orange); }
.badge-medium { background: rgba(30, 58, 95, 0.5); color: var(--blue); border: 1px solid var(--blue); }
.badge-low { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.65rem;
  background: var(--surface3);
  color: var(--text-muted);
  border: 1px solid var(--border);
  margin: 1px;
  font-family: var(--mono);
  letter-spacing: 0.02em;
}

/* ── Task Cards — Asymmetric Grid ── */
.task-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
  gap: 16px;
  margin-top: 20px;
}
/* Asymmetric: every 3rd card spans wider when possible */
@media (min-width: 1080px) {
  .task-grid { grid-template-columns: repeat(3, 1fr); }
  .task-card:nth-child(7n+1) { grid-column: span 2; }
}
.task-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  position: relative;
  overflow: hidden;
}
.task-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 3px;
  height: 100%;
  background: var(--accent-dim);
  opacity: 0;
  transition: opacity 0.25s;
}
.task-card:hover {
  border-color: var(--accent);
  box-shadow: var(--glow-sm);
  transform: translateY(-2px);
}
.task-card:hover::before { opacity: 1; background: var(--accent); }
.task-card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.task-card-name { font-family: var(--display); font-weight: 600; font-size: 0.95rem; flex: 1; }
.task-card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.task-card-size { font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); }
.task-card-actions { display: flex; gap: 8px; margin-top: 14px; }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 0.75rem;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  transition: all 0.2s;
  text-decoration: none;
  letter-spacing: 0.02em;
}
.btn:hover {
  background: var(--surface3);
  border-color: var(--accent);
  color: var(--accent);
  text-decoration: none;
  box-shadow: var(--glow-sm);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent2) 0%, var(--accent-dim) 100%);
  border-color: var(--accent);
  color: white;
}
.btn-primary:hover {
  background: var(--accent2);
  color: white;
  box-shadow: var(--glow-md);
}

/* ── Run header ── */
.run-header {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  animation: stagger-in 0.5s ease-out;
}
.run-header::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
  pointer-events: none;
}
.run-header h2 { font-family: var(--display); font-size: 1.2rem; margin-bottom: 8px; font-weight: 600; letter-spacing: -0.01em; }
.run-header-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; color: var(--text-muted); }

/* ── Output view ── */
.output-toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.output-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  animation: stagger-in 0.4s ease-out;
}
.output-container h1, .output-container h2, .output-container h3, .output-container h4 { color: var(--text); margin-top: 1.5em; margin-bottom: 0.5em; font-family: var(--display); }
.output-container h1 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; letter-spacing: -0.01em; }
.output-container h2 { font-size: 1.15rem; }
.output-container h3 { font-size: 1rem; color: var(--text-muted); }
.output-container p { margin: 0.5em 0; }
.output-container ul, .output-container ol { margin: 0.5em 0; padding-left: 1.5em; }
.output-container li { margin: 0.3em 0; }
.output-container code { font-family: var(--mono); font-size: 0.85em; background: var(--surface2); padding: 2px 6px; border-radius: 4px; color: var(--cyan); }
.output-container pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; overflow-x: auto; margin: 1em 0; position: relative; }
.output-container pre code { background: transparent; padding: 0; font-size: 0.8rem; line-height: 1.5; color: var(--text); }
.output-container table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.85rem; }
.output-container th, .output-container td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.output-container th { background: var(--surface2); font-weight: 600; color: var(--text-muted); font-family: var(--mono); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
.output-container blockquote { border-left: 3px solid var(--accent); padding-left: 14px; color: var(--text-muted); margin: 1em 0; background: rgba(139, 92, 246, 0.03); padding: 10px 14px; border-radius: 0 var(--radius) var(--radius) 0; }
.output-container hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
.output-container strong { color: var(--text); }
.output-container a { color: var(--accent); }

/* ── Copy button ── */
.copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 10px; font-size: 0.65rem; background: var(--surface3); border: 1px solid var(--border); color: var(--text-muted); border-radius: 4px; cursor: pointer; font-family: var(--mono); opacity: 0; transition: all 0.2s; }
pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--accent2); color: white; border-color: var(--accent); box-shadow: var(--glow-sm); }
.copy-btn.copied { background: var(--green-dim); color: var(--green); border-color: var(--green); }

/* ── Collapsible sections ── */
.collapsible { border: 1px solid var(--border); border-radius: var(--radius); margin: 12px 0; overflow: hidden; }
.collapsible > summary { cursor: pointer; padding: 12px 16px; background: var(--surface2); font-family: var(--display); font-weight: 600; font-size: 0.95rem; list-style: none; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
.collapsible > summary::before { content: '▸'; color: var(--accent-dim); font-family: var(--mono); font-size: 0.8rem; transition: transform 0.2s, color 0.2s; }
.collapsible[open] > summary::before { transform: rotate(90deg); color: var(--accent); }
.collapsible > summary:hover { background: var(--surface3); }
.collapsible > .section-content { padding: 16px; }

/* ── Timeline — Diagonal accent line ── */
.timeline { position: relative; padding-left: 36px; }
.timeline::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent-dim), var(--border) 30%, var(--border) 70%, var(--accent-dim));
}
.tl-event { position: relative; margin-bottom: 12px; }
.tl-dot { position: absolute; left: -30px; top: 8px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); transition: all 0.2s; }
.tl-event.tl-init .tl-dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(196, 161, 255, 0.4); }
.tl-event.tl-tool .tl-dot { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 8px rgba(96, 165, 250, 0.3); }
.tl-event.tl-thinking .tl-dot { background: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 8px rgba(251, 191, 36, 0.3); }
.tl-event.tl-text .tl-dot { background: var(--green); border-color: var(--green); box-shadow: 0 0 8px rgba(52, 211, 153, 0.3); }
.tl-event.tl-progress .tl-dot { width: 6px; height: 6px; left: -27px; top: 10px; background: var(--text-dim); border: none; }
.tl-event.tl-notification .tl-dot { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 8px rgba(251, 146, 60, 0.3); }

.tl-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; }
.tl-card:hover { border-color: var(--border-light); }
.tl-card-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
.tl-card-header:hover { background: var(--surface2); }
.tl-card-body { padding: 14px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 0.75rem; max-height: 300px; overflow: auto; white-space: pre-wrap; word-break: break-word; color: var(--text-muted); background: var(--surface2); }
.tl-tool-icon { font-size: 0.9rem; }
.tl-tool-name { font-weight: 600; color: var(--cyan); }
.tl-tool-summary { color: var(--text-muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tl-compact { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); padding: 2px 0; }
.tl-meta {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  font-family: var(--mono);
  font-size: 0.8rem;
  animation: stagger-in 0.4s ease-out;
}
.tl-meta-item { display: flex; flex-direction: column; gap: 2px; }
.tl-meta-label { color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; }
.tl-meta-value { color: var(--text); font-weight: 600; }

/* ── Config screen ── */
.config-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; animation: stagger-in 0.4s ease-out; }
.config-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.config-tab { padding: 10px 20px; font-family: var(--mono); font-size: 0.78rem; cursor: pointer; background: var(--surface); color: var(--text-muted); border: none; border-right: 1px solid var(--border); transition: all 0.2s; letter-spacing: 0.02em; }
.config-tab:last-child { border-right: none; }
.config-tab:hover { background: var(--surface2); color: var(--text); }
.config-tab.active { background: var(--accent2); color: white; box-shadow: var(--glow-sm); }
.scope-toggle { display: flex; align-items: center; gap: 8px; margin-left: auto; font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); }
.scope-toggle select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.75rem; cursor: pointer; }
.config-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr)); gap: 14px; }
.config-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  display: flex;
  flex-direction: column;
}
.config-card:hover { border-color: var(--accent-dim); box-shadow: var(--glow-sm); transform: translateY(-1px); }
.config-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.config-card-name { font-family: var(--mono); font-weight: 600; font-size: 0.9rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.config-card-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.config-card-actions { display: flex; gap: 6px; margin-top: auto; padding-top: 10px; }
.badge-scope { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; font-family: var(--mono); letter-spacing: 0.04em; }
.badge-global { background: rgba(30, 58, 95, 0.5); color: var(--blue); border: 1px solid rgba(96, 165, 250, 0.2); }
.badge-project { background: rgba(59, 7, 100, 0.5); color: #c084fc; border: 1px solid rgba(139, 92, 246, 0.2); }
.btn-danger { background: var(--red-dim); border-color: rgba(248, 113, 113, 0.3); color: var(--red); }
.btn-danger:hover { background: #991b1b; border-color: var(--red); color: white; box-shadow: 0 0 12px rgba(248, 113, 113, 0.15); }
.btn-sm { padding: 5px 12px; font-size: 0.7rem; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(7, 7, 10, 0.85); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 700px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--glow-lg);
  animation: stagger-in 0.3s ease-out;
}
.modal-header { display: flex; align-items: center; gap: 12px; padding: 18px 24px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-family: var(--display); font-size: 1rem; margin: 0; flex: 1; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; transition: color 0.2s; }
.modal-close:hover { color: var(--red); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 24px; border-top: 1px solid var(--border); }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.85rem; outline: none; box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s; }
.form-input:focus { border-color: var(--accent); box-shadow: var(--glow-sm); }
.form-textarea { width: 100%; min-height: 300px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.8rem; line-height: 1.5; resize: vertical; outline: none; box-sizing: border-box; transition: border-color 0.2s, box-shadow 0.2s; }
.form-textarea:focus { border-color: var(--accent); box-shadow: var(--glow-sm); }
.config-empty { text-align: center; color: var(--text-muted); padding: 48px; font-family: var(--mono); font-size: 0.85rem; }
.hook-card-name { font-family: var(--display); font-weight: 700; font-size: 1rem; margin-bottom: 6px; text-transform: capitalize; }
.hook-card-desc { font-size: 0.85rem; color: var(--text-muted); }



/* ── Pipeline view ── */
.pipeline-header {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  animation: stagger-in 0.5s ease-out;
}
.pipeline-header::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(34, 211, 238, 0.04) 0%, transparent 70%);
  pointer-events: none;
}
.pipeline-header h2 { font-family: var(--display); font-size: 1.2rem; margin-bottom: 8px; font-weight: 600; letter-spacing: -0.01em; }
.pipeline-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; color: var(--text-muted); }

/* ── Train visualization — Glowing cars ── */
.train-container { display: flex; align-items: center; overflow-x: auto; padding: 28px 0 36px; gap: 0; -webkit-overflow-scrolling: touch; }
.train-car {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 18px 22px;
  min-width: 210px;
  max-width: 290px;
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  position: relative;
  overflow: hidden;
}
.train-car::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.3s;
}
.train-car:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--glow-md); }
.train-car:hover::before { background: var(--accent); }
.train-car.selected { border-color: var(--accent); box-shadow: var(--glow-md); }
.train-car.selected::before { background: var(--accent); }
.train-car.pending { border-color: var(--text-dim); }
.train-car.running { border-color: var(--yellow); animation: train-pulse 2s ease-in-out infinite; }
.train-car.running::before { background: var(--yellow); }
.train-car.done { border-color: var(--green); }
.train-car.done::before { background: var(--green); }
.train-car.failed { border-color: var(--red); }
.train-car.failed::before { background: var(--red); }
@keyframes train-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); border-color: var(--yellow); }
  50% { box-shadow: 0 0 20px 4px rgba(251, 191, 36, 0.15); border-color: #fcd34d; }
}
.train-car-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.train-car-num { font-family: var(--mono); font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
.train-car-name { font-family: var(--display); font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; color: var(--text); }
.train-car-stats { display: flex; gap: 10px; font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); }
.train-car-stats span { display: flex; align-items: center; gap: 3px; }
.train-car-expand { font-family: var(--mono); font-size: 0.62rem; color: var(--text-dim); margin-top: 8px; transition: color 0.2s; text-transform: uppercase; letter-spacing: 0.04em; }
.train-car:hover .train-car-expand { color: var(--accent); }

.train-connector { display: flex; align-items: center; flex-shrink: 0; width: 44px; position: relative; }
.train-connector-line { width: 100%; height: 2px; background: var(--border); position: relative; transition: background 0.3s; }
.train-connector-arrow { position: absolute; right: -1px; top: 50%; transform: translateY(-50%); width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 8px solid var(--border); transition: border-left-color 0.3s; }
.train-connector.active .train-connector-line { background: var(--green); box-shadow: 0 0 8px rgba(52, 211, 153, 0.3); }
.train-connector.active .train-connector-arrow { border-left-color: var(--green); }

/* ── Train task breakdown panel ── */
.train-tasks-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-top: 20px; overflow: hidden; animation: slide-down 0.25s ease-out; }
@keyframes slide-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
.train-tasks-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.train-tasks-header h3 { font-family: var(--mono); font-size: 0.85rem; margin: 0; }
.train-tasks-list { padding: 4px 0; }
.train-task-row { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-family: var(--mono); font-size: 0.8rem; border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
.train-task-row:last-child { border-bottom: none; }
.train-task-row:hover { background: var(--surface2); }
.train-task-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.train-task-cost { color: var(--text-dim); font-size: 0.75rem; }
.train-task-link { color: var(--accent); font-size: 0.75rem; white-space: nowrap; }

/* Pipeline summary card */
.pipeline-summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; animation: slide-down 0.25s ease-out; }
.pipeline-summary-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.pipeline-summary-header h3 { font-family: var(--mono); font-size: 0.85rem; }
.pipeline-summary-body { padding: 16px; font-size: 0.85rem; line-height: 1.6; }
.pipeline-summary-body h2 { font-family: var(--display); font-size: 1rem; font-weight: 600; color: var(--accent); margin: 20px 0 8px 0; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.pipeline-summary-body h2:first-child { margin-top: 0; }
.pipeline-summary-body h3 { font-family: var(--mono); font-size: 0.85rem; font-weight: 600; color: var(--text); margin: 16px 0 6px 0; }
.pipeline-summary-body ul { margin: 6px 0; padding-left: 20px; }
.pipeline-summary-body li { margin-bottom: 4px; }
.pipeline-summary-body strong { color: var(--text); }
.pipeline-summary-body p { margin: 6px 0; }
.pipeline-summary-body pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; overflow-x: auto; font-size: 0.8rem; }
#generate-summary-btn:disabled { opacity: 0.6; cursor: wait; }

/* Legacy pipeline styles kept for list view */
.pipeline-flow { display: flex; align-items: flex-start; gap: 0; overflow-x: auto; padding: 16px 0 24px; }
.pipeline-stage-wrap { display: flex; align-items: flex-start; }
.pipeline-arrow { color: var(--text-dim); font-size: 1.4rem; padding: 0 6px; flex-shrink: 0; align-self: center; margin-bottom: 20px; }

.pipelines-section { margin-bottom: 28px; }
.section-title { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.pipeline-list-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.pipeline-list-table th { text-align: left; padding: 10px 14px; color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); font-weight: 500; }
.pipeline-list-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.85rem; }
.pipeline-list-table tr { cursor: pointer; transition: background 0.15s; }
.pipeline-list-table tr:hover { background: var(--surface2); }
.stage-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.stage-pill { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
.stage-pill-pending { background: var(--surface3); color: var(--text-dim); }
.stage-pill-running { background: #422006; color: #fcd34d; animation: pulse 2s infinite; }
.stage-pill-done { background: #14532d; color: #86efac; }
.stage-pill-failed { background: #7f1d1d; color: #fca5a5; }

/* ── Workspace — Diagonal offset layout ── */
.ws-top { display: flex; gap: 14px; margin-bottom: 24px; align-items: flex-end; animation: stagger-in 0.4s ease-out; }
.ws-layout { display: flex; gap: 24px; }
.ws-main { flex: 1; min-width: 0; overflow: hidden; }
/* Override the forced 3-column grid inside workspace — the sidebar reduces available width */
.ws-main .task-grid { grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr)); }
.ws-sidebar { width: 380px; flex-shrink: 0; min-width: 0; display: flex; flex-direction: column; gap: 18px; /* Diagonal offset */ margin-top: 32px; }
@media (max-width: 1200px) { .ws-layout { flex-direction: column; } .ws-sidebar { width: 100%; margin-top: 0; } }
.ws-select { flex: 1; }
.ws-select label { display: block; font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.ws-select select, .ws-select input[type="text"] { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.85rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.ws-select select:focus, .ws-select input[type="text"]:focus { border-color: var(--accent); box-shadow: var(--glow-sm); }
.ws-file-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; }
.ws-file-tab { font-family: var(--mono); font-size: 0.72rem; padding: 6px 12px; border-radius: var(--radius); cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); transition: all 0.2s; letter-spacing: 0.02em; }
.ws-file-tab:hover { border-color: var(--accent); color: var(--text); box-shadow: var(--glow-sm); }
.ws-file-tab.active { background: var(--accent2); border-color: var(--accent); color: white; box-shadow: var(--glow-sm); }
.ws-file-tab .file-count { font-size: 0.65rem; opacity: 0.7; margin-left: 4px; }
.ws-task-card {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  overflow: hidden;
  min-width: 0;
}
.ws-task-card:hover { border-color: var(--accent-dim); box-shadow: var(--glow-sm); transform: translateY(-1px); }
.ws-task-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ws-task-name { font-weight: 600; font-size: 0.9rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ws-task-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 10px; }
.ws-task-tags .tag-agent { background: #1e3a5f; color: #93c5fd; border-color: #3b82f640; }
.ws-task-tags .tag-skill { background: #3b0764; color: #c084fc; border-color: #7c3aed40; }
.ws-task-prompt { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); max-height: 40px; overflow: hidden; text-overflow: ellipsis; margin-bottom: 10px; white-space: nowrap; }
.ws-task-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-success { border-color: rgba(52, 211, 153, 0.3); color: var(--green); }
.btn-success:hover { background: var(--green-dim); border-color: var(--green); color: var(--green); box-shadow: 0 0 12px rgba(52, 211, 153, 0.1); }
/* ── Brainstorm panel ── */
.ws-brainstorm {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.ws-brainstorm::before {
  content: '';
  position: absolute;
  top: -50px;
  right: -50px;
  width: 150px;
  height: 150px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
  pointer-events: none;
}
.ws-brainstorm h3 { margin: 0 0 14px 0; font-family: var(--display); font-size: 1rem; color: var(--text); font-weight: 600; }
.ws-brainstorm-row { display: flex; gap: 12px; align-items: center; }
.ws-brainstorm-row select { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
/* Tasks.md editor */
#ws-tasks-md-container { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
.ws-tasks-md-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
#ws-tasks-md { width: 100%; min-height: 200px; max-height: 400px; font-family: var(--mono); font-size: 0.8rem; padding: 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); resize: vertical; }
.ws-tasks-md-actions { display: flex; gap: 8px; margin-top: 8px; }
.ws-brainstorm.loading button { opacity: 0.6; pointer-events: none; }
.ws-progress { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); padding: 6px 0 0; min-height: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ws-brainstorm-mode-fields { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.ws-brainstorm-mode-fields input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 4px; font-family: var(--mono); font-size: 0.8rem; outline: none; width: 100%; }
.ws-brainstorm-mode-fields input:focus { border-color: var(--accent); }
.ws-brainstorm-mode-fields label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 2px; }
.ws-repo-pipelines { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
.ws-repo-pipelines h3 { margin: 0 0 12px 0; font-size: 1rem; color: var(--text); }
.ws-pipeline-list { display: flex; flex-direction: column; gap: 8px; }
.ws-pipeline-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: var(--bg); border-radius: 4px; }
.ws-pipeline-name { font-family: var(--mono); font-size: 0.85rem; flex: 1; }
.ws-pipeline-stages { font-size: 0.75rem; color: var(--text-muted); }
.ws-empty { text-align: center; color: var(--text-muted); padding: 40px; font-family: var(--mono); font-size: 0.85rem; }
/* ── Active runs panel ── */
.ws-active-runs {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 20px;
}
.ws-active-runs h3 { margin: 0 0 14px 0; font-family: var(--display); font-size: 1rem; color: var(--text); font-weight: 600; }
.ws-run-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); margin-bottom: 6px; font-family: var(--mono); font-size: 0.8rem; }
.ws-run-spinner { width: 14px; height: 14px; border: 2px solid var(--yellow-dim); border-top-color: var(--yellow); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
.ws-run-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ws-run-id { color: var(--text-muted); font-size: 0.72rem; }
.ws-run-elapsed { color: var(--text-muted); white-space: nowrap; }
.ws-run-link { color: var(--accent); text-decoration: none; font-size: 0.75rem; white-space: nowrap; }
.ws-run-link:hover { text-decoration: underline; }
.ws-no-runs { color: var(--text-muted); font-family: var(--mono); font-size: 0.8rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.ws-section-title { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.ws-checks { display: flex; flex-wrap: wrap; gap: 6px; max-height: 140px; overflow-y: auto; padding: 4px; }
.ws-check { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 0.72rem; color: var(--text-muted); cursor: pointer; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); transition: all 0.2s; user-select: none; }
.ws-check:hover { border-color: var(--accent); box-shadow: var(--glow-sm); }
.ws-check input { accent-color: var(--accent); }
.ws-check.checked { background: var(--surface3); border-color: var(--accent); color: var(--text); }
/* Pipeline Guide section */
.ws-pipeline-guide { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
.ws-pipeline-guide h3 { margin: 0 0 12px 0; font-size: 1rem; color: var(--text); }
.ws-pipeline-guide details summary { font-family: var(--mono); font-size: 0.85rem; color: var(--accent); cursor: pointer; user-select: none; padding: 4px 0; }
.ws-pipeline-guide details summary:hover { color: var(--text); }
.pipeline-docs { margin-top: 12px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 0.78rem; color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; max-height: 320px; overflow-y: auto; }
.pipeline-docs table { border-collapse: collapse; width: 100%; margin: 8px 0; }
.pipeline-docs th, .pipeline-docs td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; font-size: 0.75rem; }
.pipeline-docs th { color: var(--text); background: var(--surface2); }
.pipeline-templates { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.pipeline-templates label { font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
.pipeline-templates select { flex: 1; min-width: 180px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.82rem; outline: none; }
.pipeline-templates select:focus { border-color: var(--accent); }

/* ── Workspace sections ── */
.ws-section {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 20px;
}

.ws-section h3 {
  margin: 0 0 14px 0;
  font-family: var(--display);
  font-size: 1rem;
  color: var(--text);
  font-weight: 600;
}

.ws-active-run {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 4px;
  margin-bottom: 8px;
}

.ws-active-run .spinner {
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.ws-pipeline-guide details {
  margin-bottom: 12px;
}

.ws-pipeline-guide summary {
  cursor: pointer;
  color: var(--blue);
}

.ws-pipeline-guide pre {
  background: var(--bg);
  padding: 12px;
  border-radius: 4px;
  overflow-x: auto;
  font-size: 0.8rem;
}

.runs-filter {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.runs-filter label { color: var(--text-muted); font-family: var(--mono); font-size: 0.75rem; white-space: nowrap; letter-spacing: 0.04em; text-transform: uppercase; }
.runs-filter select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.82rem; outline: none; flex: 1; max-width: 360px; transition: border-color 0.2s, box-shadow 0.2s; }
.runs-filter select:focus { border-color: var(--accent); box-shadow: var(--glow-sm); }

/* ── Pipeline Mapper ── */
.mapper-setup {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 24px;
  animation: stagger-in 0.4s ease-out;
}
.mapper-setup h3 { font-family: var(--display); font-size: 1.1rem; margin-bottom: 16px; font-weight: 600; }
.mapper-setup-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.mapper-setup-field { flex: 1; min-width: 200px; }
.mapper-setup-field label { display: block; font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.mapper-setup-field select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-family: var(--mono); font-size: 0.85rem; outline: none; }
.mapper-setup-field select:focus { border-color: var(--accent); }
.mapper-tasks-files { display: flex; gap: 8px; align-items: center; }
.mapper-tasks-files select { flex: 1; }
.mapper-selected-files { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.mapper-file-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border-light); border-radius: 4px; padding: 4px 10px; font-family: var(--mono); font-size: 0.75rem; color: var(--text); }
.mapper-file-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; line-height: 1; padding: 0 2px; }
.mapper-file-remove:hover { color: var(--red); }

.mapper-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; min-height: 300px; }
@media (max-width: 900px) { .mapper-columns { grid-template-columns: 1fr; } }
.mapper-col {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  display: flex;
  flex-direction: column;
}
.mapper-col-header { font-family: var(--mono); font-size: 0.78rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.mapper-col-header .count { font-weight: 400; font-size: 0.72rem; color: var(--text-dim); }

.mapper-task { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; cursor: grab; transition: border-color 0.2s, opacity 0.2s, box-shadow 0.2s, transform 0.15s; user-select: none; }
.mapper-task:hover { border-color: var(--accent); box-shadow: var(--glow-sm); transform: translateX(2px); }
.mapper-task.dragging { opacity: 0.4; }
.mapper-task.mapped-ghost { opacity: 0.4; cursor: default; border-style: dashed; }
.mapper-task.executed { border-left: 3px solid var(--green); }
.mapper-task-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.mapper-task-name { font-weight: 600; font-size: 0.85rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mapper-task-meta { display: flex; flex-wrap: wrap; gap: 4px; }
.mapper-task-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; padding: 0 4px; line-height: 1; transition: color 0.15s; }
.mapper-task-remove:hover { color: var(--red); }

.mapper-stage { margin-bottom: 16px; }
.mapper-stage-header { font-family: var(--mono); font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.mapper-stage-header .stage-num { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; }
.mapper-drop-zone { min-height: 48px; border: 2px dashed var(--border); border-radius: var(--radius); padding: 8px; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; }
.mapper-drop-zone.drag-over { border-color: var(--accent); background: rgba(139, 92, 246, 0.06); box-shadow: inset 0 0 16px rgba(139, 92, 246, 0.08); }
.mapper-drop-zone-empty { display: flex; align-items: center; justify-content: center; min-height: 48px; color: var(--text-dim); font-family: var(--mono); font-size: 0.75rem; }

.mapper-batch-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  bottom: 16px;
  z-index: 50;
  box-shadow: 0 -8px 24px rgba(7, 7, 10, 0.6);
  backdrop-filter: blur(12px);
  margin-bottom: 8px;
}
@media (max-width: 768px) {
  .mapper-batch-bar { flex-wrap: wrap; padding: 12px 16px; gap: 10px; }
  .mapper-batch-info { order: -1; width: 100%; }
}
.mapper-batch-info { font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted); flex: 1; }
.mapper-batch-info strong { color: var(--text); }

.mapper-history { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 20px; overflow: hidden; }
.mapper-history summary { cursor: pointer; padding: 12px 16px; font-family: var(--mono); font-size: 0.85rem; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 8px; }
.mapper-history summary::before { content: '▸'; color: var(--text-muted); font-size: 0.8rem; transition: transform 0.15s; }
.mapper-history[open] summary::before { transform: rotate(90deg); }
.mapper-history-list { padding: 0 16px 12px; }
.mapper-history-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.8rem; }
.mapper-history-item:last-child { border-bottom: none; }
.mapper-history-item a { color: var(--accent); }
/* ── Responsive overrides ── */
@media (max-width: 768px) {
  main { padding: 16px; }
  .task-grid { grid-template-columns: 1fr; }
  .task-card:nth-child(7n+1) { grid-column: span 1; }
  .config-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; min-height: 48px; }
  .tab-bar { padding: 0 16px; top: 48px; }
  .tab-bar a { padding: 10px 14px; font-size: 0.72rem; }
  .config-header { flex-direction: column; align-items: flex-start; }
  .scope-toggle { margin-left: 0; }
  .hero-title { font-size: 2.5rem !important; }
  .mapper-columns { grid-template-columns: 1fr; }
  .mapper-setup-row { flex-direction: column; }
}

/* ── Selection & scrollbar ── */
::selection { background: var(--accent2); color: white; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }
</style>

// ── API Client ──
const API_BASE = location.origin;
const api = {
  async getRuns() {
    const r = await fetch(`${API_BASE}/api/runs`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getRun(id) {
    const r = await fetch(`${API_BASE}/api/runs/${id}`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getOutput(runId, taskId) {
    const r = await fetch(`${API_BASE}/api/runs/${runId}/${taskId}/output`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.text();
  },
  async getStream(runId, taskId) {
    const r = await fetch(`${API_BASE}/api/runs/${runId}/${taskId}/stream?summarize=1`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getVerify(runId, taskId) {
    const r = await fetch(`${API_BASE}/api/runs/${runId}/${taskId}/verify`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getPipelines() {
    const r = await fetch(`${API_BASE}/api/pipelines`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getPipeline(id) {
    const r = await fetch(`${API_BASE}/api/pipeline/${id}`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getPipelineSummary(id) {
    const r = await fetch(`${API_BASE}/api/pipeline/${id}/summary`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async generatePipelineSummary(id) {
    const r = await fetch(`${API_BASE}/api/pipeline/${id}/summary`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
      throw new Error(err.error || `Failed: ${r.status}`);
    }
    return r.json();
  },
  // Config API
  async getAgents() {
    const r = await fetch(`${API_BASE}/api/config/agents`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getAgent(name) {
    const r = await fetch(`${API_BASE}/api/config/agents/${encodeURIComponent(name)}`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async putAgent(name, scope, content) {
    const r = await fetch(`${API_BASE}/api/config/agents/${encodeURIComponent(name)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, content })
    });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async deleteAgent(name) {
    const r = await fetch(`${API_BASE}/api/config/agents/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getSkills() {
    const r = await fetch(`${API_BASE}/api/config/skills`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getSkill(name) {
    const r = await fetch(`${API_BASE}/api/config/skills/${encodeURIComponent(name)}`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async putSkill(name, scope, content) {
    const r = await fetch(`${API_BASE}/api/config/skills/${encodeURIComponent(name)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ scope, content })
    });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async deleteSkill(name) {
    const r = await fetch(`${API_BASE}/api/config/skills/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getHooks() {
    const r = await fetch(`${API_BASE}/api/config/hooks`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  // Workspace API
  async getRepos() {
    const r = await fetch(`${API_BASE}/api/workspace/repos`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async getRepoTasks(repoPath) {
    const r = await fetch(`${API_BASE}/api/workspace/repos/${encodeURIComponent(repoPath)}/tasks`);
    if (!r.ok) throw new Error(`Failed: ${r.status}`);
    return r.json();
  },
  async createTask(file, task) {
    const r = await fetch(`${API_BASE}/api/workspace/tasks`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file, task })
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `Failed: ${r.status}`); }
    return r.json();
  },
  async updateTask(taskId, file, fields) {
    const r = await fetch(`${API_BASE}/api/workspace/tasks/${encodeURIComponent(taskId)}?file=${encodeURIComponent(file)}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(fields)
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `Failed: ${r.status}`); }
    return r.json();
  },
  async deleteTask(taskId, file) {
    const r = await fetch(`${API_BASE}/api/workspace/tasks/${encodeURIComponent(taskId)}?file=${encodeURIComponent(file)}`, { method: 'DELETE' });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `Failed: ${r.status}`); }

const cache = { runs: null, details: {}, outputs: {}, streams: {}, pipelines: null, pipelineDetails: {} };

// ── Helpers ──
function $(sel, parent) { return (parent || document).querySelector(sel); }
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'onclick') el.onclick = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  });
  return el;
}

function formatBytes(n) {
  if (!n) return '0B';
  if (n < 1024) return n + 'B';
  if (n < 1048576) return (n/1024).toFixed(1) + 'K';
  return (n/1048576).toFixed(1) + 'M';
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

function formatDuration(ms) {
  if (!ms) return '—';
  if (ms < 1000) return ms + 'ms';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return `${m}m${s % 60}s`;
}

function formatCost(n) {
  if (n == null) return '—';
  return '$' + n.toFixed(4);
}

function statusBadge(status, attempt) {
  const cls = { done: 'badge-done', running: 'badge-running', pending: 'badge-pending', failed: 'badge-failed', retrying: 'badge-retrying', verifying: 'badge-verifying' };
  const label = status || 'unknown';
  const attStr = (attempt && attempt > 1) ? ` <small>(×${attempt})</small>` : '';
  return `<span class="badge ${cls[status] || 'badge-pending'}">${label}${attStr}</span>`;
}

function verifyBadge(verifyStatus) {
  if (!verifyStatus || verifyStatus === 'skipped') return '';
  const cls = { passed: 'badge-verify-passed', failed: 'badge-verify-failed' };
  const icon = verifyStatus === 'passed' ? '✓' : '✗';
  return `<span class="badge ${cls[verifyStatus] || 'badge-verify-skipped'}">${icon} ${verifyStatus}</span>`;
}

function attemptInfo(attempt, maxAttempts) {
  if (!attempt || !maxAttempts || maxAttempts <= 1) return '';
  return `<span style="font-size:0.7rem;color:var(--text-muted)">attempt ${attempt}/${maxAttempts}</span>`;
}

function modelBadge(model) {
  if (!model) return '';
  const m = model.toLowerCase();
  let cls = 'badge-sonnet';
  if (m.includes('opus')) cls = 'badge-opus';
  else if (m.includes('haiku')) cls = 'badge-haiku';
  return `<span class="badge ${cls}">${model}</span>`;
}

function severityReplace(html) {
  return html
    .replace(/\bCRITICAL\b/g, '<span class="badge badge-critical">CRITICAL</span>')
    .replace(/\b(HIGH)\b(?![^<]*>)/g, '<span class="badge badge-high">HIGH</span>')
    .replace(/\bMEDIUM\b/g, '<span class="badge badge-medium">MEDIUM</span>')
    .replace(/\bLOW\b/g, '<span class="badge badge-low">LOW</span>');
}

// ── Stagger Animation Helper ──
function applyStaggerAnimation(container, selector) {
  if (!container) return;
  const items = container.querySelectorAll(selector);
  items.forEach((item, i) => {
    item.classList.add('stagger-item');
    item.style.animationDelay = `${(i + 1) * 60}ms`;
  });
}

function setBreadcrumb(...parts) {
  const bc = $('#breadcrumb');
  bc.innerHTML = '';
  parts.forEach((p, i) => {
    if (i > 0) bc.appendChild(h('span', { className: 'sep' }, '/'));
    if (p.href) {
      bc.appendChild(h('a', { href: p.href }, p.text));
    } else {
      bc.appendChild(h('span', { className: 'current' }, p.text));
    }
  });
}

// ── Markdown Rendering ──
function renderMarkdown(md) {
  if (!window.marked) return `<pre>${md}</pre>`;
  let html = marked.parse(md, { breaks: false, gfm: true });
  html = severityReplace(html);
  return html;
}

function highlightCodeBlocks(container) {
  if (!window.hljs) return;
  container.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
  });
}

function addCopyButtons(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const btn = h('button', { className: 'copy-btn', onclick: () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    }}, 'Copy');
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });
}

function makeCollapsible(container) {
  container.querySelectorAll('h2, h3').forEach(heading => {
    const details = document.createElement('details');
    details.className = 'collapsible';
    details.open = true;
    const summary = document.createElement('summary');
    summary.innerHTML = heading.innerHTML;
    details.appendChild(summary);
    const content = document.createElement('div');
    content.className = 'section-content';
    let sibling = heading.nextElementSibling;
    const level = heading.tagName;
    heading.parentNode.insertBefore(details, heading);
    heading.remove();
    while (sibling && !(sibling.tagName === level || (level === 'H2' && sibling.tagName === 'H2') || (level === 'H3' && (sibling.tagName === 'H2' || sibling.tagName === 'H3')))) {
      const next = sibling.nextElementSibling;
      content.appendChild(sibling);
      sibling = next;
    }
    details.appendChild(content);
  });
}

// ── Tab Highlighting ──
function updateActiveTab() {
  const hash = location.hash || '#/runs';
  const tabs = document.querySelectorAll('#tab-bar a');
  tabs.forEach(tab => {
    const href = tab.getAttribute('href');
    const isActive = hash === href
      || (href === '#/runs' && (hash === '#/' || hash === '#' || hash.startsWith('#/run/')))
      || (href === '#/pipelines' && hash.startsWith('#/pipeline/'))
      || (href === '#/mapper' && hash.startsWith('#/mapper'));
    tab.classList.toggle('active', isActive);
  });
}

// ── Router ──
function route() {
  const hash = location.hash || '#/';
  const app = $('#app');
  updateActiveTab();

  // Clean up SSE when navigating away from pipeline view
  if (pipelineEventSource && !hash.match(/^#\/pipeline\//)) {
    pipelineEventSource.close();
    pipelineEventSource = null;
    selectedTrainStage = null;
  }

  // Clean up mapper SSE when navigating away
  if (mapperEventSource && !hash.startsWith('#/mapper')) {
    mapperEventSource.close();
    mapperEventSource = null;
  }

  // Stop active-runs polling when leaving workspace
  if (hash !== '#/workspace' && wsState.activeRunsInterval) {
    wsStopActiveRunsPolling();
  }

  let m;
  if (hash === '#/' || hash === '#' || hash === '#/runs') {
    renderSessionList();
  } else if (hash === '#/config') {
    renderConfigScreen();
  } else if (hash === '#/workspace') {
    renderWorkspaceScreen();
  } else if (hash === '#/pipelines') {
    renderPipelinesScreen();
  } else if (hash === '#/mapper') {
    renderMapperScreen();
  } else if (m = hash.match(/^#\/run\/([^/]+)$/)) {
    renderRunDetail(m[1]);
  } else if (m = hash.match(/^#\/run\/([^/]+)\/([^/]+)\/output$/)) {
    renderTaskOutput(m[1], m[2]);
  } else if (m = hash.match(/^#\/run\/([^/]+)\/([^/]+)\/timeline$/)) {
    renderTaskTimeline(m[1], m[2]);
  } else if (m = hash.match(/^#\/pipeline\/([^/]+)$/)) {
    renderPipelineView(m[1]);
  } else {
    app.innerHTML = '<div class="error-banner">Route not found</div>';
  }
}

// ── Views ──
async function renderSessionList() {
  const app = $('#app');
  setBreadcrumb({ text: 'Runs' });
  app.innerHTML = '<div class="loading">Loading runs...</div>';

  try {
    if (!cache.runs) cache.runs = await api.getRuns();
    const { runs } = cache.runs;

    // Load pipelines (non-fatal)
    let pipelineHtml = '';
    try {
      if (!cache.pipelines) cache.pipelines = await api.getPipelines();
      const { pipelines } = cache.pipelines;
      if (pipelines.length > 0) {
        pipelineHtml = `<div class="pipelines-section">
          <div class="section-title">Pipelines</div>
          <table class="pipeline-list-table"><thead><tr>
            <th>Pipeline</th><th>Stages</th><th>Status</th><th>Cost</th>
          </tr></thead><tbody>`;
        for (const p of pipelines) {
          const stagePills = p.stages.map(s =>
            `<span class="stage-pill stage-pill-${s.status}">${s.name}</span>`
          ).join('');
          const totalCost = p.stages.reduce((sum, s) => sum + (s.cost_usd || 0), 0);
          pipelineHtml += `<tr onclick="location.hash='#/pipeline/${p.id}'">
            <td><span style="color:var(--text)">${p.name}</span> <span style="color:var(--text-dim);font-size:0.75rem">${formatDate(p.started_at_iso)} ${formatTime(p.started_at_iso)}</span></td>
            <td><div class="stage-pills">${stagePills}</div></td>
            <td>${statusBadge(p.status)}</td>
            <td>${totalCost > 0 ? formatCost(totalCost) : '—'}</td>
          </tr>`;
        }
        pipelineHtml += '</tbody></table></div>';
        pipelineHtml += `<div class="section-title" style="margin-top:20px">Runs</div>`;
      }
    } catch(_) {}

    // Collect unique repos across all runs
    const allRepos = [...new Set(runs.flatMap(r => r.workdirs || []))].sort();
    const initRepo = new URLSearchParams(location.search).get('repo') || '';

    const repoOptions = allRepos.map(r =>
      `<option value="${escapeHtml(r)}" ${r === initRepo ? 'selected' : ''}>${escapeHtml(r)}</option>`
    ).join('');

    let html = pipelineHtml + `
      <div style="margin-bottom:32px;animation:stagger-in 0.5s ease-out">
        <h1 class="hero-title" style="font-family:var(--display);font-size:3.5rem;font-weight:700;letter-spacing:-0.04em;line-height:1;color:var(--text);margin-bottom:4px">
          <span style="color:var(--accent)">RUN</span><span style="color:var(--text-dim)">//</span>LOG
        </h1>
        <p style="font-family:var(--mono);font-size:0.78rem;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase">${runs.length} orchestration${runs.length !== 1 ? 's' : ''} recorded</p>
      </div>
      <div class="runs-filter" style="animation:stagger-in 0.5s ease-out;animation-delay:120ms;animation-fill-mode:both">
        <label>Filter by repo:</label>
        <select id="runs-repo-filter" onchange="filterRuns()">
          <option value="">All repos</option>
          ${repoOptions}
        </select>
      </div>
      <input type="text" class="search-box" placeholder="Search runs by task name..." id="search" style="animation:stagger-in 0.5s ease-out;animation-delay:180ms;animation-fill-mode:both">`;
    html += `<table class="runs-table"><thead><tr>
      <th>Run</th><th>Status</th><th>Tasks</th><th>ECC</th><th>Output</th><th>Cost</th>
    </tr></thead><tbody id="runs-body">`;

    for (const run of runs) {
      const c = run.task_counts;
      const total = c.total || 1;
      // Use run ID as primary name, timestamp as secondary
      const runName = run.id;
      const timeStr = `${formatDate(run.started_at_iso)} ${formatTime(run.started_at_iso)}`;
      const workdirsJson = JSON.stringify(run.workdirs || []).replace(/'/g, '&#39;');
      html += `<tr onclick="location.hash='#/run/${run.id}'" data-id="${run.id}" data-workdirs='${workdirsJson}'>
        <td><span class="run-date" style="color:var(--text)">${runName}</span> <span class="run-time" style="display:block;margin-top:2px">${timeStr}</span></td>
        <td>
          <div class="status-bar">
            ${c.done ? `<div class="seg-done" style="width:${c.done/total*100}%"></div>` : ''}
            ${c.running ? `<div class="seg-running" style="width:${c.running/total*100}%"></div>` : ''}
            ${c.retrying ? `<div class="seg-retrying" style="width:${c.retrying/total*100}%"></div>` : ''}
            ${c.verifying ? `<div class="seg-verifying" style="width:${c.verifying/total*100}%"></div>` : ''}
            ${c.pending ? `<div class="seg-pending" style="width:${c.pending/total*100}%"></div>` : ''}
            ${c.failed ? `<div class="seg-failed" style="width:${c.failed/total*100}%"></div>` : ''}
          </div>
          <div class="status-counts">${c.done} done${c.running ? `, ${c.running} running` : ''}${c.retrying ? `, ${c.retrying} retrying` : ''}${c.verifying ? `, ${c.verifying} verifying` : ''}${c.failed ? `, ${c.failed} failed` : ''}</div>
        </td>
        <td>${c.total}</td>
        <td><span class="ecc-badge ${run.ecc_enabled ? 'ecc-on' : 'ecc-off'}">${run.ecc_enabled ? 'ECC' : 'standalone'}</span></td>
        <td>${formatBytes(run.total_output_bytes)}</td>
        <td style="color:var(--text-muted)">${formatCost(run.total_cost_usd)}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    app.innerHTML = html;

    // Apply initial repo filter from URL
    if (initRepo) filterRuns();

    // Search filter (also respects repo filter)
    const search = $('#search');
    search.addEventListener('input', () => {
      const q = search.value.toLowerCase();
      const repoFilter = $('#runs-repo-filter')?.value || '';
      document.querySelectorAll('#runs-body tr').forEach(tr => {
        const matchesSearch = tr.dataset.id.includes(q);
        const matchesRepo = !repoFilter || JSON.parse(tr.dataset.workdirs || '[]').includes(repoFilter);
        tr.style.display = matchesSearch && matchesRepo ? '' : 'none';
      });
    });
  } catch (e) {
    app.innerHTML = `<div class="error-banner">Error: ${e.message}</div>`;
  }
}

function filterRuns() {
  const repoFilter = $('#runs-repo-filter')?.value || '';
  const searchEl = $('#search');
  const q = searchEl ? searchEl.value.toLowerCase() : '';
  const params = new URLSearchParams(location.search);
  if (repoFilter) {
    params.set('repo', repoFilter);
  } else {
    params.delete('repo');
  }
  const newSearch = params.toString();
  history.replaceState(null, '', newSearch ? '?' + newSearch + location.hash : location.pathname + location.hash);
  document.querySelectorAll('#runs-body tr').forEach(tr => {
    const matchesSearch = !q || tr.dataset.id.includes(q);
    const matchesRepo = !repoFilter || JSON.parse(tr.dataset.workdirs || '[]').includes(repoFilter);
    tr.style.display = matchesSearch && matchesRepo ? '' : 'none';
  });
}

async function renderRunDetail(runId) {
  const app = $('#app');
  setBreadcrumb({ text: 'Runs', href: '#/runs' }, { text: runId });
  app.innerHTML = '<div class="loading">Loading run...</div>';

  try {
    if (!cache.details[runId]) cache.details[runId] = await api.getRun(runId);
    const run = cache.details[runId];

    // Check if this run belongs to a pipeline
    const pipelineMatch = runId.match(/^(pipeline-[^-]+-[^-]+-[^-]+-[^-]+-[^-]+)-s\d+t\d+$/);
    const pipelineLink = pipelineMatch
      ? `<a class="btn" href="#/pipeline/${pipelineMatch[1]}" style="margin-left:auto">← Pipeline View</a>`
      : '';
